<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>يومي — لوحة متابعة</title>
<script src="https://cdn.tailwindcss.com"></script>
<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:        #080b10;
  --bg2:       #0e1219;
  --surface:   #131720;
  --surface2:  #1a2030;
  --surface3:  #202840;
  --border:    #252d40;
  --border2:   #2e3852;
  --text:      #e2e8f8;
  --text2:     #8896b3;
  --text3:     #4d5a7a;
  --cyan:      #22d3ee;
  --amber:     #fbbf24;
  --rose:      #fb7185;
  --violet:    #a78bfa;
  --blue:      #60a5fa;
  --teal:      #2dd4bf;
  --danger:    #f87171;
  --accent:    #22d3ee;
  --accent2:   #a78bfa;
  --glow-cyan: rgba(34,211,238,.12);
  --glow-amb:  rgba(251,191,36,.12);
  --glow-vio:  rgba(167,139,250,.12);
}
[data-theme="light"] {
  --bg:        #f0f2f8;
  --bg2:       #e8ebf5;
  --surface:   #ffffff;
  --surface2:  #f4f6fc;
  --surface3:  #eaedfa;
  --border:    #dce1f0;
  --border2:   #c8d0e8;
  --text:      #0f172a;
  --text2:     #475569;
  --text3:     #94a3b8;
  --glow-cyan: rgba(34,211,238,.06);
  --glow-amb:  rgba(251,191,36,.08);
  --glow-vio:  rgba(167,139,250,.06);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Cairo',sans-serif;
  min-height:100vh;
  transition:background .4s,color .4s;
  overflow-x:hidden;
}
[lang="en"] body,[lang="en"] *{font-family:'Instrument Sans',sans-serif;}
[lang="en"] .font-display{font-family:'Syne',sans-serif !important;}
[lang="ar"] .font-display{font-family:'Cairo',sans-serif !important; font-weight:800;}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}

.bg-mesh{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.bg-mesh::before{
  content:'';position:absolute;
  width:600px;height:600px;
  background:radial-gradient(circle, rgba(34,211,238,.05) 0%, transparent 70%);
  top:-100px;right:-100px;border-radius:50%;
}
.bg-mesh::after{
  content:'';position:absolute;
  width:500px;height:500px;
  background:radial-gradient(circle, rgba(167,139,250,.05) 0%, transparent 70%);
  bottom:-100px;left:-100px;border-radius:50%;
}

/* ── Cards ── */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:16px;
  padding:1.35rem;
  position:relative;
  transition:background .4s,border-color .4s,box-shadow .3s;
}
.card:hover{border-color:var(--border2);}
.card-cyan   {border-top:2px solid var(--cyan);   box-shadow:0 0 30px var(--glow-cyan);}
.card-amber  {border-top:2px solid var(--amber);  box-shadow:0 0 30px var(--glow-amb);}
.card-violet {border-top:2px solid var(--violet); box-shadow:0 0 30px var(--glow-vio);}
.card-rose   {border-top:2px solid var(--rose);}
.card-blue   {border-top:2px solid var(--blue);}
.card-teal   {border-top:2px solid var(--teal);}

/* ── Typography ── */
.grad{
  background:linear-gradient(135deg,var(--cyan) 0%,var(--violet) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.slabel{font-size:.65rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);}

/* ── Inputs ── */
.inp{
  background:var(--surface2);
  border:1.5px solid var(--border);
  border-radius:10px;
  padding:.5rem .85rem;
  color:var(--text);
  font-family:inherit;font-size:.875rem;
  width:100%;outline:none;
  transition:border-color .2s,background .4s;
}
.inp:focus{border-color:var(--cyan);}
.inp::placeholder{color:var(--text3);}
textarea.inp{resize:vertical;min-height:95px;line-height:1.75;}

/* ── Buttons ── */
.btn{
  padding:.48rem 1rem;border-radius:9px;font-size:.84rem;font-weight:600;
  cursor:pointer;border:none;transition:all .18s;font-family:inherit;
  display:inline-flex;align-items:center;gap:.4rem;
}
.btn-cyan   {background:var(--cyan);color:#080b10;}
.btn-cyan:hover{filter:brightness(1.1);}
.btn-ghost  {background:var(--surface2);color:var(--text2);border:1px solid var(--border);}
.btn-ghost:hover{color:var(--text);border-color:var(--border2);}
.btn-danger {background:rgba(248,113,113,.1);color:var(--danger);border:1px solid rgba(248,113,113,.2);}
.btn-danger:hover{background:rgba(248,113,113,.2);}
.btn-icon{
  width:34px;height:34px;padding:0;border-radius:8px;
  background:var(--surface2);border:1px solid var(--border);
  color:var(--text2);cursor:pointer;transition:all .18s;
  display:inline-flex;align-items:center;justify-content:center;
  font-family:inherit;
}
.btn-icon:hover{background:var(--surface3);color:var(--text);border-color:var(--border2);}

/* ── Checkbox ── */
.cb-wrap{position:relative;flex-shrink:0;}
.cb-wrap input{position:absolute;opacity:0;width:0;height:0;}
.cb-box{
  width:20px;height:20px;
  border:2px solid var(--border2);border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;cursor:pointer;background:transparent;
}
.cb-wrap input:checked+.cb-box{background:var(--cyan);border-color:var(--cyan);}
.cb-wrap input:checked+.cb-box svg{display:block;}
.cb-box svg{display:none;width:11px;height:11px;}

/* ── Task row ── */
.task-row{
  display:flex;align-items:center;gap:.7rem;
  padding:.55rem .65rem;border-radius:10px;
  transition:background .15s;cursor:pointer;
}
.task-row:hover{background:var(--surface2);}
.task-row.done .task-lbl{text-decoration:line-through;color:var(--text3);}

/* ── Category badge ── */
.cat-badge{
  font-size:.6rem;font-weight:700;padding:.1rem .45rem;
  border-radius:99px;flex-shrink:0;
}
.cat-work    {background:rgba(96,165,250,.12);color:var(--blue);border:1px solid rgba(96,165,250,.25);}
.cat-sport   {background:rgba(34,211,238,.12);color:var(--cyan);border:1px solid rgba(34,211,238,.25);}
.cat-personal{background:rgba(167,139,250,.12);color:var(--violet);border:1px solid rgba(167,139,250,.25);}
.cat-health  {background:rgba(251,191,36,.12);color:var(--amber);border:1px solid rgba(251,191,36,.25);}

/* ── Category filter pills ── */
.fcat-pill{
  padding:.25rem .7rem;border-radius:99px;font-size:.72rem;font-weight:600;
  border:1px solid var(--border);color:var(--text3);cursor:pointer;
  transition:all .15s;font-family:inherit;background:transparent;
}
.fcat-pill.active-work    {background:rgba(96,165,250,.12);border-color:var(--blue);color:var(--blue);}
.fcat-pill.active-sport   {background:rgba(34,211,238,.12);border-color:var(--cyan);color:var(--cyan);}
.fcat-pill.active-personal{background:rgba(167,139,250,.12);border-color:var(--violet);color:var(--violet);}
.fcat-pill.active-health  {background:rgba(251,191,36,.12);border-color:var(--amber);color:var(--amber);}
.fcat-pill.active-all{background:var(--surface3);border-color:var(--border2);color:var(--text);}

/* ── Progress bar ── */
.pbar{height:6px;background:var(--surface3);border-radius:99px;overflow:hidden;}
.pbar-fill{
  height:100%;border-radius:99px;
  background:linear-gradient(90deg,var(--cyan),var(--violet));
  transition:width .5s cubic-bezier(.4,0,.2,1);
}

/* ── Del button ── */
.delbtn{
  opacity:0;width:26px;height:26px;border-radius:7px;
  background:transparent;border:none;cursor:pointer;
  color:var(--danger);
  display:inline-flex;align-items:center;justify-content:center;
  transition:opacity .15s,background .15s;flex-shrink:0;
}
.task-row:hover .delbtn,
.meal-row:hover .delbtn,
.log-hdr:hover .delbtn{opacity:1;}
.delbtn:hover{background:rgba(248,113,113,.12);}

/* ── Calorie ring ── */
.rsvg{transform:rotate(-90deg);}
.rbg{fill:none;stroke:var(--surface3);stroke-width:9;}
.rfg{fill:none;stroke:var(--amber);stroke-width:9;stroke-linecap:round;transition:stroke-dashoffset .6s cubic-bezier(.4,0,.2,1);}

/* ── Meal row ── */
.meal-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:.4rem .65rem;border-radius:9px;animation:fadeUp .2s ease;
}
.meal-row:nth-child(odd){background:var(--surface2);}

/* ── Tabs ── */
.tab-btn{
  padding:.4rem .9rem;border-radius:8px;font-size:.82rem;font-weight:600;
  cursor:pointer;border:1px solid var(--border);background:transparent;
  color:var(--text2);transition:all .18s;font-family:inherit;
}
.tab-btn.active{background:var(--surface3);border-color:var(--border2);color:var(--text);}

/* ── Note category pills ── */
.npill{
  padding:.25rem .7rem;border-radius:99px;font-size:.75rem;font-weight:600;
  border:1px solid var(--border);color:var(--text3);cursor:pointer;transition:all .15s;
  font-family:inherit;background:transparent;
}
.npill.p-workout{background:rgba(34,211,238,.12);border-color:var(--cyan);color:var(--cyan);}
.npill.p-general{background:rgba(167,139,250,.12);border-color:var(--violet);color:var(--violet);}
.npill.p-food   {background:rgba(251,191,36,.12);border-color:var(--amber);color:var(--amber);}

/* ── Log cards ── */
.log-card{border:1px solid var(--border);border-radius:13px;overflow:hidden;animation:fadeUp .3s ease;}
.log-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:.7rem 1rem;cursor:pointer;background:var(--surface2);
  user-select:none;transition:background .15s;
}
.log-hdr:hover{background:var(--surface3);}
.log-body{padding:1rem;display:none;border-top:1px solid var(--border);}
.log-body.open{display:block;}

/* ── Calorie target ── */
.target-inp{
  background:transparent;border:none;border-bottom:1.5px dashed var(--border2);
  color:var(--amber);font-weight:700;font-size:.95rem;
  width:55px;text-align:center;outline:none;font-family:inherit;
}
.target-inp:focus{border-bottom-color:var(--amber);}

/* ── Header controls ── */
.lang-toggle{
  display:flex;align-items:center;gap:2px;
  background:var(--surface2);border:1px solid var(--border);border-radius:8px;overflow:hidden;
}
.lang-btn{
  padding:.3rem .6rem;font-size:.75rem;font-weight:700;cursor:pointer;
  border:none;background:transparent;color:var(--text2);transition:all .15s;font-family:'Syne',sans-serif;
}
.lang-btn.active{background:var(--surface3);color:var(--text);}

.theme-toggle{
  width:44px;height:24px;border-radius:99px;
  background:var(--surface2);border:1.5px solid var(--border);
  cursor:pointer;position:relative;transition:background .3s;flex-shrink:0;
}
.theme-toggle::after{
  content:'';position:absolute;top:3px;left:3px;
  width:16px;height:16px;border-radius:50%;
  background:var(--cyan);transition:transform .3s;
}
[data-theme="light"] .theme-toggle::after{transform:translateX(20px);}
[dir="rtl"] .theme-toggle::after{left:auto;right:3px;}
[dir="rtl"][data-theme="light"] .theme-toggle::after{transform:translateX(-20px);}

/* ── Toast ── */
#toast{
  position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--surface);border:1px solid var(--border2);border-radius:12px;
  padding:.6rem 1.2rem;font-size:.84rem;color:var(--text);
  box-shadow:0 10px 40px rgba(0,0,0,.4);z-index:999;
  transition:transform .35s cubic-bezier(.4,0,.2,1),opacity .35s;
  opacity:0;pointer-events:none;white-space:nowrap;font-family:inherit;
}

/* ── Confirm dialog ── */
#confirmDialog{
  position:fixed;inset:0;z-index:200;display:none;
  align-items:center;justify-content:center;
  background:rgba(0,0,0,.6);backdrop-filter:blur(4px);
}
#confirmDialog.open{display:flex;}
.confirm-box{
  background:var(--surface);border:1px solid var(--border2);
  border-radius:16px;padding:1.5rem;max-width:320px;width:90%;
  box-shadow:0 20px 60px rgba(0,0,0,.5);
  animation:fadeUp .2s ease;
}

/* ── Stats ── */
.stat-mini{
  display:flex;flex-direction:column;align-items:center;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:12px;padding:.75rem .5rem;text-align:center;
  flex:1;min-width:0;
}

/* ── Notif card ── */
.notif-row{
  display:flex;align-items:center;gap:.7rem;
  padding:.5rem .65rem;border-radius:10px;
  background:var(--surface2);margin-bottom:.4rem;
  border:1px solid var(--border);
}

/* ── Week chart bar ── */
.wbar-wrap{
  display:flex;flex-direction:column;align-items:center;gap:.3rem;flex:1;
}
.wbar-bg{
  width:100%;height:80px;background:var(--surface3);border-radius:6px;
  position:relative;overflow:hidden;
}
.wbar-fill{
  position:absolute;bottom:0;left:0;right:0;
  border-radius:6px;
  transition:height .5s cubic-bezier(.4,0,.2,1);
}
.wbar-lbl{font-size:.6rem;color:var(--text3);font-weight:600;}
.wbar-val{font-size:.65rem;color:var(--text2);font-weight:700;}

/* ── Animations ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.4)}100%{transform:scale(1)}}
.pop{animation:pop .22s ease;}

/* ── Layout ── */
@media(min-width:1024px){
  .mgrid{display:grid;grid-template-columns:1fr 1fr;gap:1.2rem;align-items:start;}
}
.scol>*+*{margin-top:1.2rem;}

/* ── Stat badge ── */
.stat-badge{
  display:inline-flex;align-items:center;gap:.35rem;
  padding:.2rem .6rem;border-radius:99px;font-size:.72rem;font-weight:700;
}
.sb-cyan  {background:rgba(34,211,238,.12);color:var(--cyan);border:1px solid rgba(34,211,238,.25);}
.sb-amber {background:rgba(251,191,36,.12);color:var(--amber);border:1px solid rgba(251,191,36,.25);}

/* ── Divider ── */
.divider{height:1px;background:var(--border);margin:.75rem 0;}

/* ── Add task category selector ── */
.cat-select{
  background:var(--surface2);border:1.5px solid var(--border);
  border-radius:10px;padding:.5rem .7rem;color:var(--text);
  font-family:inherit;font-size:.8rem;outline:none;cursor:pointer;
  transition:border-color .2s;
}
.cat-select:focus{border-color:var(--cyan);}
</style>
</head>
<body>
<div class="bg-mesh"></div>

<!-- ════════════ CONFIRM DIALOG ════════════ -->
<div id="confirmDialog">
  <div class="confirm-box">
    <p style="font-size:.95rem;font-weight:600;margin-bottom:.5rem;" id="confirmMsg"></p>
    <p style="font-size:.8rem;color:var(--text2);margin-bottom:1.25rem;" id="confirmSub"></p>
    <div style="display:flex;gap:.6rem;justify-content:flex-end;">
      <button class="btn btn-ghost" id="confirmCancel"></button>
      <button class="btn btn-danger" id="confirmOk"></button>
    </div>
  </div>
</div>

<!-- ════════════ HEADER ════════════ -->
<header style="background:rgba(8,11,16,.85);border-bottom:1px solid var(--border);backdrop-filter:blur(16px);position:sticky;top:0;z-index:50;" id="mainHeader">
  <div style="max-width:1000px;margin:0 auto;padding:.7rem 1rem;display:flex;align-items:center;justify-content:space-between;gap:.75rem;">
    <div style="display:flex;align-items:center;gap:.6rem;flex-shrink:0;">
      <span class="font-display grad" style="font-size:1.25rem;font-weight:800;" id="logoText">يومي</span>
    </div>
    <div style="display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;justify-content:flex-end;">
      <span id="headerDate" style="font-size:.75rem;color:var(--text2);"></span>
      <div class="lang-toggle">
        <button class="lang-btn" id="btnEN" onclick="setLang('en')">EN</button>
        <button class="lang-btn active" id="btnAR" onclick="setLang('ar')">ع</button>
      </div>
      <div style="display:flex;align-items:center;gap:.4rem;">
        <span style="font-size:.8rem;" id="themeIcon">🌙</span>
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme"></button>
        <span style="font-size:.8rem;">☀️</span>
      </div>
    </div>
  </div>
</header>

<!-- ════════════ MAIN ════════════ -->
<main style="max-width:1000px;margin:0 auto;padding:1.5rem 1rem;position:relative;z-index:1;">

  <!-- Greeting -->
  <div style="margin-bottom:1.5rem;">
    <h1 class="font-display grad" id="greeting" style="font-size:2rem;font-weight:800;line-height:1.15;margin-bottom:.3rem;"></h1>
    <p id="subGreeting" style="font-size:.875rem;color:var(--text2);"></p>
  </div>

  <!-- Tabs -->
  <div style="display:flex;gap:.5rem;margin-bottom:1.25rem;flex-wrap:wrap;" id="tabBar">
    <button class="tab-btn active" data-tab="today"  id="tabToday"></button>
    <button class="tab-btn"        data-tab="notes"  id="tabNotes"></button>
    <button class="tab-btn"        data-tab="week"   id="tabWeek"></button>
    <button class="tab-btn"        data-tab="notifs" id="tabNotifs"></button>
    <button class="tab-btn"        data-tab="log"    id="tabLog"></button>
  </div>

  <!-- ══ TAB: TODAY ══ -->
  <div id="tab-today">
    <div class="mgrid">
      <!-- LEFT -->
      <div class="scol">
        <!-- HABITS -->
        <div class="card card-cyan">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;">
            <div style="display:flex;align-items:center;gap:.6rem;">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--cyan)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
              <h2 class="font-display" style="font-size:1rem;font-weight:700;" id="titleHabits"></h2>
            </div>
            <button class="btn btn-ghost" style="font-size:.75rem;padding:.35rem .75rem;" id="resetDayBtn"></button>
          </div>
          <!-- Category filter -->
          <div style="display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.85rem;" id="catFilterBar">
            <button class="fcat-pill active-all" data-fcat="all" id="fcatAll"></button>
            <button class="fcat-pill" data-fcat="work"    id="fcatWork"></button>
            <button class="fcat-pill" data-fcat="sport"   id="fcatSport"></button>
            <button class="fcat-pill" data-fcat="personal"id="fcatPersonal"></button>
            <button class="fcat-pill" data-fcat="health"  id="fcatHealth"></button>
          </div>
          <!-- Progress -->
          <div style="margin-bottom:1rem;">
            <div style="display:flex;justify-content:space-between;font-size:.75rem;color:var(--text2);margin-bottom:.5rem;">
              <span id="lblProgress"></span><span id="progressLabel"></span>
            </div>
            <div class="pbar"><div class="pbar-fill" id="progressBar" style="width:0%"></div></div>
          </div>
          <!-- Task list -->
          <div id="taskList" style="display:flex;flex-direction:column;gap:.2rem;margin-bottom:1rem;"></div>
          <!-- Add task -->
          <div style="display:flex;gap:.5rem;flex-wrap:wrap;">
            <input class="inp" style="flex:1;min-width:120px;" id="newTaskInput" type="text" maxlength="60"/>
            <select class="cat-select" id="newTaskCat">
              <option value="work" id="optWork"></option>
              <option value="sport" id="optSport"></option>
              <option value="personal" id="optPersonal"></option>
              <option value="health" id="optHealth"></option>
            </select>
            <button class="btn btn-cyan flex-shrink-0" id="addTaskBtn"></button>
          </div>
        </div>

        <!-- CALORIE TRACKER -->
        <div class="card card-amber">
          <div style="display:flex;align-items:center;gap:.6rem;margin-bottom:1rem;">

};

// ── 7. TASK TRACKER + CATEGORIES ─────────────────────────────
const CAT_COLORS = {
  work:'cat-work', sport:'cat-sport', personal:'cat-personal', health:'cat-health'
};
const CAT_LABELS = cat => ({
  work:t('optWork'), sport:t('optSport'), personal:t('optPersonal'), health:t('optHealth')
})[cat] || cat;

const renderTasks = () => {
  const list = $('taskList');
  list.innerHTML = '';
  const filtered = activeCatFilter==='all' ? tasks : tasks.filter(x=>x.cat===activeCatFilter);
  filtered.forEach(task => {
    const lbl = typeof task.label === 'object' ? (task.label[lang]||task.label.en) : task.label;
    const catCls = CAT_COLORS[task.cat] || 'cat-personal';
    const row = document.createElement('div');
    row.className = `task-row${task.done ? ' done' : ''}`;
    row.innerHTML = `
      <label class="cb-wrap">
        <input type="checkbox" ${task.done?'checked':''} data-id="${task.id}"/>
        <div class="cb-box">
          <svg viewBox="0 0 13 13" fill="none" stroke="#080b10" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="1.5 7 5 10.5 11.5 2.5"/>
          </svg>
        </div>
      </label>
      <span class="task-lbl" style="flex:1;font-size:.875rem;">${esc(lbl)}</span>
      <span class="cat-badge ${catCls}">${CAT_LABELS(task.cat)}</span>
      <button class="delbtn task-del" data-id="${task.id}">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg></button>
    `;
    list.appendChild(row);
  });
  list.querySelectorAll('input[type="checkbox"]').forEach(cb => {
    cb.addEventListener('change', e => {
      const task = tasks.find(x => x.id===e.target.dataset.id);
      if (!task) return;
      task.done = e.target.checked;
      save('zn_tasks', tasks);
      const box = e.target.nextElementSibling;
      box.classList.add('pop');
      box.addEventListener('animationend', ()=>box.classList.remove('pop'),{once:true});
      renderTasks(); updateProgress();
    });
  });
  list.querySelectorAll('.task-del').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      tasks = tasks.filter(x => x.id!==btn.dataset.id);
      save('zn_tasks', tasks); renderTasks(); updateProgress();
    });
  });
  updateProgress();
};

const updateProgress = () => {
  const total = tasks.length, done = tasks.filter(x=>x.done).length;
  $('progressBar').style.width = total ? Math.round(done/total*100)+'%' : '0%';
  $('progressLabel').textContent = `${done}/${total} ${t('tasksDone')}`;
};

$('addTaskBtn').addEventListener('click', () => {
  const v = $('newTaskInput').value.trim();
  const cat = $('newTaskCat').value;
  if (!v) return;
  tasks.push({id:'t'+Date.now(), label:{en:v, ar:v}, done:false, fixed:false, cat});
  save('zn_tasks', tasks);
  $('newTaskInput').value = '';
  renderTasks();
  showToast(lang==='ar' ? `تم الإضافة ✅` : `Added ✅`);
});

$('resetDayBtn').addEventListener('click', () => {

const renderMeals = () => {
  const list = $('mealList'), empty = $('emptyMeals');
  list.querySelectorAll('.meal-row').forEach(r=>r.remove());
  empty.style.display = meals.length ? 'none' : 'block';
  meals.forEach((m,i) => {
    const row = document.createElement('div');
    row.className = 'meal-row';
    row.innerHTML = `
      <div style="display:flex;align-items:center;gap:.5rem;flex:1;min-width:0;">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--amber)" stroke-width="2" stroke-linecap="round"><path d="M18 8h1a4 4 0 010 8h-1"/><path d="M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
        <span style="font-size:.82rem;" class="truncate">${esc(m.name)}</span>
      </div>
      <span style="font-size:.82rem;font-weight:700;color:var(--amber);flex-shrink:0;margin:0 .5rem;">${m.kcal}</span>
      <button class="delbtn meal-del" data-i="${i}">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>`;
    list.appendChild(row);
  });
  list.querySelectorAll('.meal-del').forEach(btn => {
    btn.addEventListener('click', () => {
      meals.splice(+btn.dataset.i, 1);
      save('zn_meals', meals); renderMeals();
    });
  });
  updateCalStats();
};

const updateCalStats = () => {
  const total = meals.reduce((s,m)=>s+m.kcal, 0);
  const circ  = 2 * Math.PI * 44;
  const pct   = Math.min(total/calTarget, 1);
  $('calRing').style.strokeDashoffset = circ - circ*pct;
  $('calRing').style.stroke = total>calTarget ? 'var(--rose)' : 'var(--amber)';
  $('calTotal').textContent = total;
  $('calTotalBig').innerHTML = `${total} <span style="font-size:.85rem;color:var(--text2);font-weight:400;">kcal</span>`;
  const rem = calTarget - total;
  $('calRemaining').textContent = rem>=0
    ? `${rem} kcal ${t('remaining')}`
    : `${Math.abs(rem)} kcal ${t('over')}`;
  $('calRemaining').style.color = rem<0 ? 'var(--rose)' : 'var(--text2)';
};

$('addMealBtn').addEventListener('click', () => {
  const name = $('mealNameInput').value.trim();
  const kcal = parseInt($('mealCalInput').value);
  if (!name) { showToast(lang==='ar'?'أدخل اسم الطعام':'Enter food name'); return; }
  if (!kcal||kcal<1) { showToast(lang==='ar'?'أدخل السعرات':'Enter calories'); return; }
  meals.push({name,kcal});
  save('zn_meals', meals);
  $('mealNameInput').value=''; $('mealCalInput').value='';
  renderMeals();
  showToast(lang==='ar' ? `تم تسجيل "${name}"` : `Logged "${name}" · ${kcal} kcal`);
});

$('calTargetInput').value = calTarget;

$('clearMealsBtn').addEventListener('click', () => {

});

// ── 10. DAY LOG ──────────────────────────────────────────────
const snapshotToday = () => {
  const today = todayKey();
  const notes = allNotes[today]||{workout:'',general:'',food:''};
  const snap = {
    date: today,
    dateLabel: {
      en: new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'}),
      ar: new Date().toLocaleDateString('ar-SA',{weekday:'long',year:'numeric',month:'long',day:'numeric'}),
    },
    doneTasks:  tasks.filter(x=>x.done).length,
    totalTasks: tasks.length,
    totalKcal:  meals.reduce((s,m)=>s+m.kcal,0),
    calTarget,
    tasksByCategory: ['work','sport','personal','health'].reduce((acc,cat)=>({
      ...acc,
      [cat]: { done: tasks.filter(x=>x.cat===cat&&x.done).length, total: tasks.filter(x=>x.cat===cat).length }
    }),{}),
    notes: {...notes},
  };
  const idx = dayLog.findIndex(d=>d.date===today);
  if (idx>=0) dayLog[idx]=snap; else dayLog.unshift(snap);
  if (dayLog.length>60) dayLog=dayLog.slice(0,60);
  save('zn_daylog', dayLog);
};

// ── 11. WEEK STATS ───────────────────────────────────────────
const getLast7Days = () => {
  const days = [];
  for (let i=6; i>=0; i--) {
    const d = new Date(); d.setDate(d.getDate()-i);
    const key = d.toISOString().slice(0,10);
    const entry = dayLog.find(e=>e.date===key);
    const dayShort = d.toLocaleDateString(lang==='ar'?'ar-SA':'en-US',{weekday:'short'});
    days.push({key, entry, dayShort});
  }
  return days;
};

const renderWeekStats = () => {
  const days = getLast7Days();
  const hasData = days.some(d=>d.entry);

  if (!hasData) {
    $('wAvgTasks').textContent = '—';
    $('wAvgCal').textContent   = '—';
    $('wBestDay').textContent  = '—';
    $('wTaskChart').innerHTML = `<p style="font-size:.82rem;color:var(--text3);padding:1rem 0;width:100%;text-align:center;">${t('noData')}</p>`;
    $('wCalChart').innerHTML  = '';
    $('wTaskChartLabels').innerHTML = '';
    $('wCalChartLabels').innerHTML  = '';
    $('wCatBreakdown').innerHTML    = '';
    return;
  }

  // Summary
  const entriesWithTasks = days.filter(d=>d.entry&&d.entry.totalTasks>0);
  const avgComp = entriesWithTasks.length
    ? Math.round(entriesWithTasks.reduce((s,d)=>s+d.entry.doneTasks/d.entry.totalTasks*100,0)/entriesWithTasks.length)
    : 0;
  const entriesWithMeals = days.filter(d=>d.entry&&d.entry.totalKcal>0);
  const avgCal = entriesWithMeals.length
    ? Math.round(entriesWithMeals.reduce((s,d)=>s+d.entry.totalKcal,0)/entriesWithMeals.length)
    : 0;

  let bestDay = '—', bestPct = -1;
  days.forEach(d => {
    if (!d.entry||!d.entry.totalTasks) return;
    const pct = d.entry.doneTasks/d.entry.totalTasks;
    if (pct>bestPct) { bestPct=pct; bestDay=d.dayShort; }
  });

  $('wAvgTasks').textContent = avgComp+'%';
  $('wAvgCal').textContent   = avgCal ? avgCal.toLocaleString() : '—';
  $('wBestDay').textContent  = bestDay;

  // Task bar chart
  const maxPct = 100;
  $('wTaskChart').innerHTML = '';
  $('wTaskChartLabels').innerHTML = '';
  days.forEach(d => {
    const pct = d.entry&&d.entry.totalTasks ? Math.round(d.entry.doneTasks/d.entry.totalTasks*100) : 0;
    const h = Math.round(pct/maxPct*80);
    const isToday = d.key===todayKey();
    const bar = document.createElement('div');
    bar.className = 'wbar-wrap';
    bar.innerHTML = `
      <div class="wbar-val" style="color:${pct>0?'var(--cyan)':'var(--text3)'};">${pct>0?pct+'%':''}</div>
      <div class="wbar-bg">
        <div class="wbar-fill" style="height:${h}px;background:${isToday?'linear-gradient(0deg,var(--cyan),var(--violet))':'rgba(34,211,238,.35)'}"></div>
      </div>
    `;
    $('wTaskChart').appendChild(bar);
    const lbl = document.createElement('div');
    lbl.className='wbar-wrap';
    lbl.innerHTML=`<div class="wbar-lbl" style="color:${isToday?'var(--cyan)':'var(--text3)'};">${d.dayShort}</div>`;
    $('wTaskChartLabels').appendChild(lbl);
  });

  // Calorie bar chart
  const maxCal = Math.max(...days.map(d=>d.entry?d.entry.totalKcal:0), 1);
  $('wCalChart').innerHTML = '';
  $('wCalChartLabels').innerHTML = '';
  days.forEach(d => {
    const kcal = d.entry ? d.entry.totalKcal : 0;
    const h = Math.round(kcal/maxCal*80);
    const over = d.entry && kcal > (d.entry.calTarget||2500);
    const isToday = d.key===todayKey();
    const bar = document.createElement('div');
    bar.className = 'wbar-wrap';
    bar.innerHTML = `
      <div class="wbar-val" style="color:${over?'var(--rose)':kcal>0?'var(--amber)':'var(--text3)'};">${kcal>0?kcal.toLocaleString():''}</div>
      <div class="wbar-bg">
        <div class="wbar-fill" style="height:${h}px;background:${over?'var(--rose)':isToday?'linear-gradient(0deg,var(--amber),var(--rose))':'rgba(251,191,36,.4)'}"></div>
      </div>
    `;
    $('wCalChart').appendChild(bar);
    const lbl = document.createElement('div');
    lbl.className='wbar-wrap';
    lbl.innerHTML=`<div class="wbar-lbl" style="color:${isToday?'var(--amber)':'var(--text3)'};">${d.dayShort}</div>`;
    $('wCalChartLabels').appendChild(lbl);
  });

  // Category breakdown
  const catTotals = {work:{done:0,total:0},sport:{done:0,total:0},personal:{done:0,total:0},health:{done:0,total:0}};
  days.forEach(d=>{
    if (!d.entry||!d.entry.tasksByCategory) return;
    Object.entries(d.entry.tasksByCategory).forEach(([cat,{done,total}])=>{
      if (catTotals[cat]) { catTotals[cat].done+=done; catTotals[cat].total+=total; }
    });
  });
  const catColors = {work:'var(--blue)',sport:'var(--cyan)',personal:'var(--violet)',health:'var(--amber)'};
  const catIcons  = {work:'💼',sport:'🏃',personal:'🌱',health:'💊'};
  $('wCatBreakdown').innerHTML = Object.entries(catTotals).map(([cat,{done,total}])=>{
    const pct = total ? Math.round(done/total*100) : 0;
    const lbl = CAT_LABELS(cat);
    const color = catColors[cat];
    return `<div>
      <div style="display:flex;justify-content:space-between;font-size:.78rem;margin-bottom:.3rem;">
        <span>${catIcons[cat]} ${lbl}</span>
        <span style="color:${color};font-weight:700;">${pct}%</span>
      </div>
      <div class="pbar">
        <div style="height:100%;border-radius:99px;background:${color};width:${pct}%;transition:width .5s cubic-bezier(.4,0,.2,1);"></div>
      </div>
    </div>`;
  }).join('');
};


// ── 12. NOTIFICATIONS ────────────────────────────────────────
const updateNotifStatus = () => {
  const perm = ('Notification' in window) ? Notification.permission : 'unsupported';
  const map = {granted:t('notifGranted'), denied:t('notifDenied'), default:t('notifDefault'), unsupported:'غير مدعوم'};
  $('notifStatus').textContent = map[perm]||'';
  $('enableNotifBtn').style.display = perm==='granted' ? 'none' : 'flex';
};

$('enableNotifBtn').addEventListener('click', async () => {
  if (!('Notification' in window)) { showToast('المتصفح لا يدعم الإشعارات'); return; }
  const result = await Notification.requestPermission();
  updateNotifStatus();
  if (result==='granted') showToast(lang==='ar'?'تم تفعيل الإشعارات ✅':'Notifications enabled ✅');
});

// Custom notifs
const renderCustomNotifs = () => {
  const list=$('customNotifList');
  list.innerHTML='';
  if (!customNotifs.length) {
    list.innerHTML=`<p style="font-size:.8rem;color:var(--text3);">${t('noReminders')}</p>`;
    return;
  }
  customNotifs.forEach((n,i)=>{
    const row=document.createElement('div');
    row.className='notif-row';
    row.innerHTML=`
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="2" stroke-linecap="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
      <div style="flex:1;">
        <div style="font-size:.82rem;font-weight:600;">${esc(n.msg)}</div>
        <div style="font-size:.72rem;color:var(--text3);">${n.time}</div>
      </div>
      <button class="btn-icon del-custom" data-i="${i}">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="var(--danger)" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>`;
    list.appendChild(row);
  });
  list.querySelectorAll('.del-custom').forEach(btn=>{
    btn.addEventListener('click',()=>{
      customNotifs.splice(+btn.dataset.i,1);
      save('zn_custom_notifs',customNotifs);
      renderCustomNotifs(); scheduleNotifs();
    });
  });
};

$('addCustomNotifBtn').addEventListener('click',()=>{
  const msg=$('customNotifMsg').value.trim();
  const time=$('customNotifTime').value;
  if (!msg||!time) { showToast(lang==='ar'?'أدخل نص ووقت':'Enter message and time'); return; }
  customNotifs.push({msg,time});
  save('zn_custom_notifs',customNotifs);
  $('customNotifMsg').value='';
  renderCustomNotifs(); scheduleNotifs();
  showToast(lang==='ar'?'تم إضافة التذكير ✅':'Reminder added ✅');
});

const fireNotif = (title, body) => {
  if (!('Notification' in window) || Notification.permission!=='granted') {
    showToast(lang==='ar'?'فعّل الإشعارات أولاً':'Enable notifications first');
    return;
  }
  new Notification(title, {body});
};

const scheduleNotifs = () => {
  clearInterval(window._notifInterval);
  window._notifInterval = setInterval(()=>{
    const now = new Date();
    const hhmm = now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
    customNotifs.forEach(n=>{
      if (n.time===hhmm) fireNotif('🔔 '+n.msg, '');
    });
  }, 60000);
};


// ── 13. CONFIRM DIALOG ───────────────────────────────────────
let _confirmCallback = null;
const showConfirm = (msg, sub, okLbl, cancelLbl, cb) => {
  $('confirmMsg').textContent    = msg;
  $('confirmSub').textContent    = sub;
  $('confirmOk').textContent     = okLbl;
  $('confirmCancel').textContent = cancelLbl;
  _confirmCallback = cb;
  $('confirmDialog').classList.add('open');
};
$('confirmOk').addEventListener('click',()=>{
  $('confirmDialog').classList.remove('open');
  if (_confirmCallback) { _confirmCallback(); _confirmCallback=null; }
});
$('confirmCancel').addEventListener('click',()=>{
  $('confirmDialog').classList.remove('open');
  _confirmCallback=null;
});
$('confirmDialog').addEventListener('click',e=>{
  if (e.target===$('confirmDialog')) {
    $('confirmDialog').classList.remove('open');
    _confirmCallback=null;
  }
});


// ── 14. TOAST ────────────────────────────────────────────────
let toastTimer=null;
const showToast = msg => {
  const el=$('toast');
  el.textContent=msg; el.style.opacity='1';
  el.style.transform='translateX(-50%) translateY(0)';
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{
    el.style.opacity='0';
    el.style.transform='translateX(-50%) translateY(80px)';
  },2800);
};


// ── 15. INIT ─────────────────────────────────────────────────
const init = () => {
  applyTheme();
  applyLang();
  loadTodayNotes();
  switchNoteCat('workout');
  snapshotToday();
  scheduleNotifs();
};

// init() يُستدعى من loadAll بعد تحميل البيانات من Firebase
</script>
</body>
