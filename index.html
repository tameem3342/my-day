<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta http-equiv="X-Content-Type-Options" content="nosniff"/>
<title>يومي — لوحة متابعة</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#080b10;--bg2:#0e1219;--surface:#131720;--surface2:#1a2030;--surface3:#202840;
  --border:#252d40;--border2:#2e3852;--text:#e2e8f8;--text2:#8896b3;--text3:#4d5a7a;
  --cyan:#22d3ee;--amber:#fbbf24;--rose:#fb7185;--violet:#a78bfa;--blue:#60a5fa;
  --teal:#2dd4bf;--danger:#f87171;--accent:#22d3ee;--accent2:#a78bfa;
  --green:#4ade80;--orange:#fb923c;
  --glow-cyan:rgba(34,211,238,.12);--glow-amb:rgba(251,191,36,.12);--glow-vio:rgba(167,139,250,.12);
}
[data-theme="light"]{
  --bg:#f0f2f8;--bg2:#e8ebf5;--surface:#ffffff;--surface2:#f4f6fc;--surface3:#eaedfa;
  --border:#dce1f0;--border2:#c8d0e8;--text:#0f172a;--text2:#475569;--text3:#94a3b8;
  --glow-cyan:rgba(34,211,238,.06);--glow-amb:rgba(251,191,36,.08);--glow-vio:rgba(167,139,250,.06);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Cairo',sans-serif;min-height:100vh;transition:background .4s,color .4s;overflow-x:hidden;}
[lang="en"] *{font-family:'Instrument Sans',sans-serif;}
[lang="en"] .font-display{font-family:'Syne',sans-serif!important;}
[lang="ar"] .font-display{font-family:'Cairo',sans-serif!important;font-weight:800;}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}
.bg-mesh{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.bg-mesh::before{content:'';position:absolute;width:600px;height:600px;background:radial-gradient(circle,rgba(34,211,238,.05) 0%,transparent 70%);top:-100px;right:-100px;border-radius:50%;}
.bg-mesh::after{content:'';position:absolute;width:500px;height:500px;background:radial-gradient(circle,rgba(167,139,250,.05) 0%,transparent 70%);bottom:-100px;left:-100px;border-radius:50%;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.35rem;position:relative;transition:background .4s,border-color .4s,box-shadow .3s;}
.card:hover{border-color:var(--border2);}
.card-cyan{border-top:2px solid var(--cyan);box-shadow:0 0 30px var(--glow-cyan);}
.card-amber{border-top:2px solid var(--amber);box-shadow:0 0 30px var(--glow-amb);}
.card-violet{border-top:2px solid var(--violet);box-shadow:0 0 30px var(--glow-vio);}
.card-rose{border-top:2px solid var(--rose);}
.card-blue{border-top:2px solid var(--blue);}
.card-teal{border-top:2px solid var(--teal);}
.card-green{border-top:2px solid var(--green);}
.grad{background:linear-gradient(135deg,var(--cyan) 0%,var(--violet) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.slabel{font-size:.65rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);}
.inp{background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:.5rem .85rem;color:var(--text);font-family:inherit;font-size:.875rem;width:100%;outline:none;transition:border-color .2s,background .4s;}
.inp:focus{border-color:var(--cyan);}
.inp::placeholder{color:var(--text3);}
textarea.inp{resize:vertical;min-height:95px;line-height:1.75;}
.btn{padding:.48rem 1rem;border-radius:9px;font-size:.84rem;font-weight:600;cursor:pointer;border:none;transition:all .18s;font-family:inherit;display:inline-flex;align-items:center;gap:.4rem;}
.btn-cyan{background:var(--cyan);color:#080b10;}.btn-cyan:hover{filter:brightness(1.1);}
.btn-ghost{background:var(--surface2);color:var(--text2);border:1px solid var(--border);}.btn-ghost:hover{color:var(--text);border-color:var(--border2);}
.btn-danger{background:rgba(248,113,113,.1);color:var(--danger);border:1px solid rgba(248,113,113,.2);}.btn-danger:hover{background:rgba(248,113,113,.2);}
.btn-violet{background:var(--violet);color:#080b10;}.btn-violet:hover{filter:brightness(1.1);}
.btn-icon{width:34px;height:34px;padding:0;border-radius:8px;background:var(--surface2);border:1px solid var(--border);color:var(--text2);cursor:pointer;transition:all .18s;display:inline-flex;align-items:center;justify-content:center;font-family:inherit;}
.btn-icon:hover{background:var(--surface3);color:var(--text);border-color:var(--border2);}
.cb-wrap{position:relative;flex-shrink:0;}
.cb-wrap input{position:absolute;opacity:0;width:0;height:0;}
.cb-box{width:20px;height:20px;border:2px solid var(--border2);border-radius:6px;display:flex;align-items:center;justify-content:center;transition:all .2s;cursor:pointer;background:transparent;}
.cb-wrap input:checked+.cb-box{background:var(--cyan);border-color:var(--cyan);}
.cb-wrap input:checked+.cb-box svg{display:block;}
.cb-box svg{display:none;width:11px;height:11px;}
.task-row{display:flex;align-items:center;gap:.7rem;padding:.55rem .65rem;border-radius:10px;transition:background .15s;cursor:pointer;}
.task-row:hover{background:var(--surface2);}
.task-row.done .task-lbl{text-decoration:line-through;color:var(--text3);}
.cat-badge{font-size:.6rem;font-weight:700;padding:.1rem .45rem;border-radius:99px;flex-shrink:0;}
.cat-work{background:rgba(96,165,250,.12);color:var(--blue);border:1px solid rgba(96,165,250,.25);}
.cat-sport{background:rgba(34,211,238,.12);color:var(--cyan);border:1px solid rgba(34,211,238,.25);}
.cat-personal{background:rgba(167,139,250,.12);color:var(--violet);border:1px solid rgba(167,139,250,.25);}
.cat-health{background:rgba(251,191,36,.12);color:var(--amber);border:1px solid rgba(251,191,36,.25);}
.cat-prayer{background:rgba(74,222,128,.12);color:var(--green);border:1px solid rgba(74,222,128,.25);}
.fcat-pill{padding:.25rem .7rem;border-radius:99px;font-size:.72rem;font-weight:600;border:1px solid var(--border);color:var(--text3);cursor:pointer;transition:all .15s;font-family:inherit;background:transparent;}
.fcat-pill.active-work{background:rgba(96,165,250,.12);border-color:var(--blue);color:var(--blue);}
.fcat-pill.active-sport{background:rgba(34,211,238,.12);border-color:var(--cyan);color:var(--cyan);}
.fcat-pill.active-personal{background:rgba(167,139,250,.12);border-color:var(--violet);color:var(--violet);}
.fcat-pill.active-health{background:rgba(251,191,36,.12);border-color:var(--amber);color:var(--amber);}
.fcat-pill.active-all{background:var(--surface3);border-color:var(--border2);color:var(--text);}
.pbar{height:6px;background:var(--surface3);border-radius:99px;overflow:hidden;}
.pbar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--cyan),var(--violet));transition:width .5s cubic-bezier(.4,0,.2,1);}
/* Delete button — shown on hover */
.delbtn{opacity:0;width:26px;height:26px;border-radius:7px;background:transparent;border:none;cursor:pointer;color:var(--danger);display:inline-flex;align-items:center;justify-content:center;transition:opacity .15s,background .15s;flex-shrink:0;}
.task-row:hover .delbtn,.meal-row:hover .delbtn,.log-hdr:hover .delbtn,.notif-row:hover .delbtn{opacity:1;}
.delbtn:hover{background:rgba(248,113,113,.12);}
/* Steps ring */
.rsvg{transform:rotate(-90deg);}
.rbg{fill:none;stroke:var(--surface3);stroke-width:9;}
.rfg{fill:none;stroke:var(--amber);stroke-width:9;stroke-linecap:round;transition:stroke-dashoffset .6s cubic-bezier(.4,0,.2,1);}
.meal-row{display:flex;align-items:center;justify-content:space-between;padding:.4rem .65rem;border-radius:9px;animation:fadeUp .2s ease;}
.meal-row:nth-child(odd){background:var(--surface2);}
.tab-btn{padding:.4rem .9rem;border-radius:8px;font-size:.82rem;font-weight:600;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text2);transition:all .18s;font-family:inherit;}
.tab-btn.active{background:var(--surface3);border-color:var(--border2);color:var(--text);}
.npill{padding:.25rem .7rem;border-radius:99px;font-size:.75rem;font-weight:600;border:1px solid var(--border);color:var(--text3);cursor:pointer;transition:all .15s;font-family:inherit;background:transparent;}
.npill.p-workout{background:rgba(34,211,238,.12);border-color:var(--cyan);color:var(--cyan);}
.npill.p-general{background:rgba(167,139,250,.12);border-color:var(--violet);color:var(--violet);}
.npill.p-food{background:rgba(251,191,36,.12);border-color:var(--amber);color:var(--amber);}
.log-card{border:1px solid var(--border);border-radius:13px;overflow:hidden;animation:fadeUp .3s ease;}
.log-hdr{display:flex;align-items:center;justify-content:space-between;padding:.7rem 1rem;cursor:pointer;background:var(--surface2);user-select:none;transition:background .15s;}
.log-hdr:hover{background:var(--surface3);}
.log-body{padding:1rem;display:none;border-top:1px solid var(--border);}
.log-body.open{display:block;}
.target-inp{background:transparent;border:none;border-bottom:1.5px dashed var(--border2);color:var(--amber);font-weight:700;font-size:.95rem;width:55px;text-align:center;outline:none;font-family:inherit;}
.target-inp:focus{border-bottom-color:var(--amber);}
.lang-toggle{display:flex;align-items:center;gap:2px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.lang-btn{padding:.3rem .6rem;font-size:.75rem;font-weight:700;cursor:pointer;border:none;background:transparent;color:var(--text2);transition:all .15s;font-family:'Syne',sans-serif;}
.lang-btn.active{background:var(--surface3);color:var(--text);}
.theme-toggle{width:44px;height:24px;border-radius:99px;background:var(--surface2);border:1.5px solid var(--border);cursor:pointer;position:relative;transition:background .3s;flex-shrink:0;}
.theme-toggle::after{content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:var(--cyan);transition:transform .3s;}
[data-theme="light"] .theme-toggle::after{transform:translateX(20px);}
[dir="rtl"] .theme-toggle::after{left:auto;right:3px;}
[dir="rtl"][data-theme="light"] .theme-toggle::after{transform:translateX(-20px);}
#toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:.6rem 1.2rem;font-size:.84rem;color:var(--text);box-shadow:0 10px 40px rgba(0,0,0,.4);z-index:999;transition:transform .35s cubic-bezier(.4,0,.2,1),opacity .35s;opacity:0;pointer-events:none;white-space:nowrap;font-family:inherit;}
#confirmDialog{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);}
#confirmDialog.open{display:flex;}
.confirm-box{background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:1.5rem;max-width:320px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.5);animation:fadeUp .2s ease;}
.stat-mini{display:flex;flex-direction:column;align-items:center;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:.75rem .5rem;text-align:center;flex:1;min-width:0;}
.notif-row{display:flex;align-items:center;gap:.7rem;padding:.5rem .65rem;border-radius:10px;background:var(--surface2);margin-bottom:.4rem;border:1px solid var(--border);}
.wbar-wrap{display:flex;flex-direction:column;align-items:center;gap:.3rem;flex:1;}
.wbar-bg{width:100%;height:80px;background:var(--surface3);border-radius:6px;position:relative;overflow:hidden;}
.wbar-fill{position:absolute;bottom:0;left:0;right:0;border-radius:6px;transition:height .5s cubic-bezier(.4,0,.2,1);}
.wbar-lbl{font-size:.6rem;color:var(--text3);font-weight:600;}
.wbar-val{font-size:.65rem;color:var(--text2);font-weight:700;}
@keyframes fadeUp{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.4)}100%{transform:scale(1)}}
@keyframes spin{to{transform:rotate(360deg)}}
.pop{animation:pop .22s ease;}
@media(min-width:1024px){.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:1.2rem;align-items:start;}}
.scol>*+*{margin-top:1.2rem;}
.stat-badge{display:inline-flex;align-items:center;gap:.35rem;padding:.2rem .6rem;border-radius:99px;font-size:.72rem;font-weight:700;}
.sb-cyan{background:rgba(34,211,238,.12);color:var(--cyan);border:1px solid rgba(34,211,238,.25);}
.sb-amber{background:rgba(251,191,36,.12);color:var(--amber);border:1px solid rgba(251,191,36,.25);}
.divider{height:1px;background:var(--border);margin:.75rem 0;}
.cat-select{background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:.5rem .7rem;color:var(--text);font-family:inherit;font-size:.8rem;outline:none;cursor:pointer;transition:border-color .2s;}
.cat-select:focus{border-color:var(--cyan);}
/* Calendar bar */
.cal-bar{display:flex;gap:.4rem;overflow-x:auto;padding-bottom:.4rem;scrollbar-width:none;}
.cal-bar::-webkit-scrollbar{display:none;}
.cal-day-btn{flex-shrink:0;width:52px;display:flex;flex-direction:column;align-items:center;gap:.15rem;padding:.4rem .2rem;border-radius:12px;border:1px solid var(--border);background:transparent;cursor:pointer;transition:all .18s;font-family:inherit;}
.cal-day-btn:hover{background:var(--surface2);border-color:var(--border2);}
.cal-day-btn.active{background:var(--cyan);border-color:var(--cyan);}
.cal-day-btn.active .cal-dname,.cal-day-btn.active .cal-dnum{color:#080b10;}
.cal-day-btn.has-data{border-color:var(--violet);}
.cal-dname{font-size:.58rem;font-weight:700;color:var(--text3);text-transform:uppercase;}
.cal-dnum{font-size:1rem;font-weight:800;color:var(--text);}
.cal-dot{width:5px;height:5px;border-radius:50%;background:var(--violet);}
.viewing-past{background:rgba(167,139,250,.08);border:1px solid rgba(167,139,250,.3);border-radius:12px;padding:.5rem .85rem;font-size:.8rem;color:var(--violet);display:flex;align-items:center;gap:.5rem;margin-bottom:.85rem;}
/* Steps ring */
.steps-ring-wrap{position:relative;width:90px;height:90px;flex-shrink:0;}
.steps-ring-bg{fill:none;stroke:var(--surface3);stroke-width:9;}
.steps-ring-fg{fill:none;stroke:var(--teal);stroke-width:9;stroke-linecap:round;transition:stroke-dashoffset .6s cubic-bezier(.4,0,.2,1);}
.step-target-inp{background:transparent;border:none;border-bottom:1.5px dashed var(--border2);color:var(--teal);font-weight:700;font-size:.95rem;width:60px;text-align:center;outline:none;font-family:inherit;}
.step-target-inp:focus{border-bottom-color:var(--teal);}
/* Notes color toolbar */
.note-toolbar{display:flex;gap:.35rem;flex-wrap:wrap;margin-bottom:.5rem;align-items:center;}
.color-swatch{width:22px;height:22px;border-radius:6px;border:2px solid transparent;cursor:pointer;transition:transform .15s,border-color .15s;flex-shrink:0;}
.color-swatch:hover{transform:scale(1.2);}
.color-swatch.active-swatch{border-color:var(--text);}
.note-format-btn{padding:.2rem .5rem;border-radius:6px;font-size:.72rem;font-weight:700;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-family:inherit;transition:all .15s;}
.note-format-btn:hover{background:var(--surface3);color:var(--text);}
/* Custom habit modal */
#habitModal{position:fixed;inset:0;z-index:300;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);}
#habitModal.open{display:flex;}
.modal-box{background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:1.5rem;max-width:360px;width:92%;box-shadow:0 20px 60px rgba(0,0,0,.5);animation:fadeUp .2s ease;}

/* ── Food Log Modal ── */
.fm-tab{background:transparent;color:var(--text2);}
.fm-tab.active{background:var(--surface);color:var(--text);box-shadow:0 1px 6px rgba(0,0,0,.25);}
.fm-lbl{font-size:.7rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);display:block;margin-bottom:.3rem;}
.food-card{display:flex;align-items:center;gap:.75rem;padding:.6rem .7rem;border-radius:12px;background:var(--surface2);border:1px solid var(--border);animation:fadeUp .2s ease;position:relative;}
.food-card:hover .delbtn{opacity:1;}
.food-thumb{width:46px;height:46px;border-radius:9px;object-fit:cover;flex-shrink:0;background:var(--surface3);}
.food-thumb-placeholder{width:46px;height:46px;border-radius:9px;flex-shrink:0;background:var(--surface3);display:flex;align-items:center;justify-content:center;}
.food-type-badge{font-size:.58rem;font-weight:700;padding:.1rem .4rem;border-radius:99px;flex-shrink:0;}
.food-type-meal{background:rgba(34,211,238,.1);color:var(--cyan);border:1px solid rgba(34,211,238,.2);}
.food-type-product{background:rgba(167,139,250,.1);color:var(--violet);border:1px solid rgba(167,139,250,.2);}
.macro-chip{display:flex;flex-direction:column;align-items:center;padding:.45rem .3rem;border-radius:9px;background:var(--surface2);border:1px solid var(--border);}

/* ── Saved Meals Library ── */
.saved-meal-row{display:flex;align-items:center;gap:.6rem;padding:.5rem .65rem;border-radius:10px;background:var(--surface2);border:1px solid var(--border);transition:border-color .18s,background .18s;cursor:pointer;}
.saved-meal-row:hover{border-color:var(--cyan);background:var(--surface3);}
.saved-meal-row:hover .sm-add-btn{opacity:1;background:var(--cyan);color:#080b10;}
.sm-add-btn{opacity:0;width:28px;height:28px;border-radius:7px;border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .18s;flex-shrink:0;font-family:inherit;}
.sm-del-btn{opacity:0;width:24px;height:24px;border-radius:6px;background:transparent;border:none;cursor:pointer;color:var(--danger);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.saved-meal-row:hover .sm-del-btn{opacity:1;}
.fm-3tab{flex:1;padding:.4rem .2rem;border-radius:8px;font-size:.75rem;font-weight:600;border:none;cursor:pointer;font-family:inherit;transition:all .18s;background:transparent;color:var(--text2);}
.fm-3tab.active{background:var(--surface);color:var(--text);box-shadow:0 1px 6px rgba(0,0,0,.25);}
.sm-thumb{width:36px;height:36px;border-radius:7px;object-fit:cover;flex-shrink:0;}
.sm-thumb-ph{width:36px;height:36px;border-radius:7px;background:var(--surface3);flex-shrink:0;display:flex;align-items:center;justify-content:center;}
</style>
</head>
<body>
<div class="bg-mesh"></div>

<!-- CONFIRM DIALOG -->
<div id="confirmDialog">
  <div class="confirm-box">
    <p style="font-size:.95rem;font-weight:600;margin-bottom:.5rem;" id="confirmMsg"></p>
    <p style="font-size:.8rem;color:var(--text2);margin-bottom:1.25rem;" id="confirmSub"></p>
    <div style="display:flex;gap:.6rem;justify-content:flex-end;">
      <button class="btn btn-ghost" id="confirmCancel"></button>
      <button class="btn btn-danger" id="confirmOk"></button>
    </div>
  </div>
</div>

<!-- HABIT MODAL -->
<div id="habitModal">
  <div class="modal-box">
    <h3 class="font-display" style="font-size:1rem;font-weight:700;margin-bottom:1rem;" id="modalTitle">إضافة عادة مخصصة</h3>
    <input class="inp" id="habitNameInp" type="text" maxlength="60" style="margin-bottom:.6rem;" placeholder="اسم العادة…"/>
    <select class="cat-select inp" id="habitCatInp" style="margin-bottom:1rem;">
      <option value="personal">شخصي</option>
      <option value="work">شغل</option>
      <option value="sport">رياضة</option>
      <option value="health">صحة</option>
      <option value="prayer">دين/صلاة</option>
    </select>
    <div style="display:flex;gap:.6rem;justify-content:flex-end;">
      <button class="btn btn-ghost" id="habitCancelBtn">إلغاء</button>
      <button class="btn btn-cyan" id="habitSaveBtn">إضافة</button>
    </div>
  </div>
</div>

<!-- HEADER -->
<header style="background:rgba(8,11,16,.85);border-bottom:1px solid var(--border);backdrop-filter:blur(16px);position:sticky;top:0;z-index:50;" id="mainHeader">
  <div style="max-width:1000px;margin:0 auto;padding:.7rem 1rem;display:flex;align-items:center;justify-content:space-between;gap:.75rem;">
    <div style="display:flex;align-items:center;gap:.6rem;flex-shrink:0;">
      <svg width="28" height="28" viewBox="0 0 32 32" fill="none"><circle cx="16" cy="16" r="14" fill="rgba(34,211,238,.1)" stroke="var(--cyan)" stroke-width="1.5"/><path d="M16 9v7l4 3" stroke="var(--cyan)" stroke-width="2" stroke-linecap="round"/></svg>

    </div>
    <div style="display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;justify-content:flex-end;">
      <span id="headerDate" style="font-size:.75rem;color:var(--text2);"></span>

      <div style="display:flex;align-items:center;gap:.4rem;">

        <span style="font-size:.8rem;">☀️</span>
      </div>
    </div>
  </div>
</header>

<main style="max-width:1000px;margin:0 auto;padding:1.5rem 1rem;position:relative;z-index:1;">
  <div style="margin-bottom:1.5rem;">
    <h1 class="font-display grad" id="greeting" style="font-size:2rem;font-weight:800;line-height:1.15;margin-bottom:.3rem;"></h1>
    <p id="subGreeting" style="font-size:.875rem;color:var(--text2);"></p>
  </div>

  <!-- Tabs -->
  <div style="display:flex;gap:.5rem;margin-bottom:1.25rem;flex-wrap:wrap;" id="tabBar">
    <button class="tab-btn active" data-tab="today"  id="tabToday"></button>
    <button class="tab-btn"        data-tab="notes"  id="tabNotes"></button>
    <button class="tab-btn"        data-tab="week"   id="tabWeek"></button>
    <button class="tab-btn"        data-tab="notifs" id="tabNotifs"></button>
    <button class="tab-btn"        data-tab="log"    id="tabLog"></button>
  </div>

  <!-- ══ TAB: TODAY ══ -->
  <div id="tab-today">
    <!-- Calendar / day navigator -->
    <div class="card" style="margin-bottom:1.2rem;padding:1rem;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.65rem;">
        <span class="slabel" id="lblCalNav">التنقل بين الأيام</span>
        <button class="btn btn-ghost" style="font-size:.73rem;padding:.3rem .7rem;" id="jumpTodayBtn">اليوم</button>

      <div class="cal-bar" id="calBar"></div>
    </div>
    <!-- Past-day banner -->
    <div class="viewing-past" id="pastBanner" style="display:none;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span id="pastBannerText"></span>
    </div>

    <div class="mgrid">
      <!-- LEFT -->
      <div class="scol">
        <!-- HABITS / TASKS -->
        <div class="card card-cyan">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;">
            <div style="display:flex;align-items:center;gap:.6rem;">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--cyan)" stroke-width="2" stroke-linecap="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
              <h2 class="font-display" style="font-size:1rem;font-weight:700;" id="titleHabits"></h2>
            </div>
            <div style="display:flex;gap:.4rem;">
              <button class="btn btn-ghost" style="font-size:.73rem;padding:.3rem .65rem;" id="addHabitBtn">+ <span id="lblAddHabit">عادة</span></button>
              <button class="btn btn-ghost" style="font-size:.75rem;padding:.35rem .75rem;" id="resetDayBtn"></button>
            </div>
          </div>
          <!-- Category filter pills -->
          <div style="display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.85rem;" id="catFilterBar">
            <button class="fcat-pill active-all" data-fcat="all"     id="fcatAll"></button>
            <button class="fcat-pill"            data-fcat="work"    id="fcatWork"></button>
            <button class="fcat-pill"            data-fcat="sport"   id="fcatSport"></button>
            <button class="fcat-pill"            data-fcat="personal"id="fcatPersonal"></button>
            <button class="fcat-pill"            data-fcat="health"  id="fcatHealth"></button>
          </div>
          <!-- Progress -->
          <div style="margin-bottom:1rem;">
            <div style="display:flex;justify-content:space-between;font-size:.75rem;color:var(--text2);margin-bottom:.5rem;">
              <span id="lblProgress"></span><span id="progressLabel"></span>
            </div>
            <div class="pbar"><div class="pbar-fill" id="progressBar" style="width:0%"></div></div>
          </div>
          <!-- Task list -->
          <div id="taskList" style="display:flex;flex-direction:column;gap:.2rem;margin-bottom:1rem;"></div>
          <!-- Add task row -->
          <div style="display:flex;gap:.5rem;flex-wrap:wrap;">
            <input class="inp" style="flex:1;min-width:120px;" id="newTaskInput" type="text" maxlength="60"/>
            <select class="cat-select" id="newTaskCat">
              <option value="personal" id="optPersonal"></option>
              <option value="work"     id="optWork"></option>
              <option value="sport"    id="optSport"></option>
              <option value="health"   id="optHealth"></option>
              <option value="prayer"   id="optPrayer"></option>
            </select>
            <button class="btn btn-cyan flex-shrink-0" id="addTaskBtn"></button>
          </div>
        </div>

        <!-- STEPS -->
        <div class="card card-teal">
          <div style="display:flex;align-items:center;gap:.6rem;margin-bottom:1rem;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--teal)" stroke-width="2" stroke-linecap="round"><path d="M13 4H9l-5 9h4l-2 7 11-11h-4l3-5z"/></svg>
            <h2 class="font-display" style="font-size:1rem;font-weight:700;" id="titleSteps">الخطوات اليومية</h2>
          </div>
          <div style="display:flex;align-items:center;gap:1.25rem;margin-bottom:1rem;">
            <div class="steps-ring-wrap">
              <svg width="90" height="90" style="transform:rotate(-90deg)" viewBox="0 0 90 90">
                <circle class="steps-ring-bg" cx="45" cy="45" r="36"/>
                <circle class="steps-ring-fg" id="stepsRing" cx="45" cy="45" r="36" stroke-dasharray="226.2" stroke-dashoffset="226.2"/>
              </svg>
              <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;">
                <span style="font-size:1.1rem;font-weight:800;color:var(--teal);" id="stepsCount">0</span>
                <span style="font-size:.58rem;color:var(--text3);" id="lblStepsUnit">خطوة</span>
              </div>
            </div>
            <div style="flex:1;">
              <div style="display:flex;align-items:center;gap:.3rem;font-size:.82rem;color:var(--text2);margin-bottom:.5rem;">
                <span id="lblStepTarget">الهدف:</span>
                <input class="step-target-inp" id="stepsTargetInput" type="number" min="1000" max="99999" value="10000"/>
                <span id="lblStepsUnitGoal">خطوة</span>
              </div>
              <p style="font-size:.75rem;color:var(--text2);" id="stepsRemaining"></p>
            </div>
          </div>
          <div style="display:flex;gap:.5rem;">
            <input class="inp" id="stepsInput" type="number" min="0" max="99999" style="flex:1;" placeholder="0"/>
            <button class="btn btn-cyan" id="logStepsBtn" style="flex-shrink:0;">
              <span id="lblLogSteps">تسجيل</span>
            </button>
          </div>
        </div>

        <!-- FOOD LOG -->
        <div class="card card-amber" id="foodLogCard">
          <!-- Header -->
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;">
            <div style="display:flex;align-items:center;gap:.6rem;">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--amber)" stroke-width="2" stroke-linecap="round"><path d="M8.5 14.5A2.5 2.5 0 0011 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 01-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 002.5 3z"/></svg>
              <h2 class="font-display" style="font-size:1rem;font-weight:700;" id="titleCalories"></h2>
            </div>
            <button class="btn btn-cyan" id="openFoodModalBtn" style="font-size:.78rem;padding:.38rem .8rem;gap:.35rem;">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              <span id="lblAddFood">Add Food</span>
            </button>
          </div>

          <!-- Summary ring + stats -->
          <div style="display:flex;align-items:center;gap:1.25rem;margin-bottom:1.2rem;">
            <div style="position:relative;flex-shrink:0;width:108px;height:108px;">
              <svg width="108" height="108" class="rsvg" viewBox="0 0 108 108">
                <circle class="rbg" cx="54" cy="54" r="44"/>
                <circle class="rfg" id="calRing" cx="54" cy="54" r="44" stroke-dasharray="276.46" stroke-dashoffset="276.46"/>
              </svg>
              <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;">
                <span style="font-size:1.2rem;font-weight:800;color:var(--amber);" id="calTotal">0</span>
                <span style="font-size:.65rem;color:var(--text3);">kcal</span>
              </div>
            </div>
            <div style="flex:1;">
              <p style="font-size:.75rem;color:var(--text2);" id="lblConsumed"></p>
              <p style="font-size:1.4rem;font-weight:800;line-height:1.2;" id="calTotalBig">0 <span style="font-size:.85rem;color:var(--text2);font-weight:400;">kcal</span></p>
              <div style="display:flex;align-items:center;gap:.3rem;font-size:.82rem;color:var(--text2);margin-top:.4rem;">
                <span id="lblTarget"></span>
                <input class="target-inp" id="calTargetInput" type="number" min="500" max="9999" value="2500"/>
                <span>kcal</span>
              </div>
              <p style="font-size:.75rem;margin-top:.3rem;" id="calRemaining"></p>
            </div>
          </div>

          <!-- Macro mini-bars -->
          <div id="macroBar" style="display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;margin-bottom:1rem;"></div>

          <!-- Food log list -->
          <div class="slabel" style="margin-bottom:.6rem;" id="lblMealLog"></div>
          <div id="mealList" style="display:flex;flex-direction:column;gap:.4rem;max-height:260px;overflow-y:auto;">
            <p style="font-size:.82rem;color:var(--text3);text-align:center;padding:1.25rem 0;" id="emptyMeals"></p>
          </div>
          <button class="btn btn-danger" style="width:100%;justify-content:center;margin-top:.75rem;font-size:.78rem;" id="clearMealsBtn"></button>
        </div>
      </div>

      <!-- RIGHT: Notes card (desktop) -->
      <div class="scol">
        <div class="card card-violet" id="desktopNoteCard">
          <div style="display:flex;align-items:center;gap:.6rem;margin-bottom:1rem;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--violet)" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            <h2 class="font-display" style="font-size:1rem;font-weight:700;" id="titleNotes"></h2>
          </div>
          <div style="display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:.75rem;" id="pillsDesktop">
            <button class="npill p-workout" data-cat="workout">🏋️ <span class="pill-lbl" data-key="workout"></span></button>
            <button class="npill p-general" data-cat="general">📝 <span class="pill-lbl" data-key="general"></span></button>
            <button class="npill p-food"    data-cat="food">🥗 <span class="pill-lbl" data-key="food"></span></button>
          </div>
          <!-- Color toolbar desktop -->
          <div class="note-toolbar" id="noteToolbarD">
            <span class="slabel" style="margin-left:.2rem;margin-right:.2rem;">🎨</span>
            <div class="color-swatch active-swatch" data-color="" style="background:var(--text);border-color:var(--text3);" title="عادي"></div>
            <div class="color-swatch" data-color="#22d3ee" style="background:#22d3ee;" title="سماوي"></div>
            <div class="color-swatch" data-color="#fbbf24" style="background:#fbbf24;" title="ذهبي"></div>
            <div class="color-swatch" data-color="#fb7185" style="background:#fb7185;" title="وردي"></div>
            <div class="color-swatch" data-color="#a78bfa" style="background:#a78bfa;" title="بنفسجي"></div>
            <div class="color-swatch" data-color="#4ade80" style="background:#4ade80;" title="أخضر"></div>
            <div class="color-swatch" data-color="#fb923c" style="background:#fb923c;" title="برتقالي"></div>
          </div>
          <div id="dpanel-workout" class="dnote-panel">
            <div id="note-preview-dw" style="min-height:95px;padding:.5rem .85rem;font-size:.875rem;line-height:1.75;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;outline:none;white-space:pre-wrap;word-break:break-word;" contenteditable="true" data-note="workout"></div>
          </div>
          <div id="dpanel-general" class="dnote-panel" style="display:none;">
            <div id="note-preview-dg" style="min-height:95px;padding:.5rem .85rem;font-size:.875rem;line-height:1.75;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;outline:none;white-space:pre-wrap;word-break:break-word;" contenteditable="true" data-note="general"></div>
          </div>
          <div id="dpanel-food" class="dnote-panel" style="display:none;">
            <div id="note-preview-df" style="min-height:95px;padding:.5rem .85rem;font-size:.875rem;line-height:1.75;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;outline:none;white-space:pre-wrap;word-break:break-word;" contenteditable="true" data-note="food"></div>
          </div>
          <button class="btn btn-cyan" style="width:100%;justify-content:center;margin-top:.9rem;" id="saveNotesDesktop"></button>
        </div>
      </div>
    </div>

        <button class="npill p-general" data-cat="general">📝 <span class="pill-lbl" data-key="general"></span></button>
        <button class="npill p-food"    data-cat="food">🥗 <span class="pill-lbl" data-key="food"></span></button>
      </div>
      <div class="note-toolbar" id="noteToolbarM">
        <span class="slabel" style="margin:0 .2rem;">🎨</span>
        <div class="color-swatch active-swatch" data-color="" style="background:var(--text);border-color:var(--text3);" title="عادي"></div>
        <div class="color-swatch" data-color="#22d3ee" style="background:#22d3ee;"></div>
        <div class="color-swatch" data-color="#fbbf24" style="background:#fbbf24;"></div>
        <div class="color-swatch" data-color="#fb7185" style="background:#fb7185;"></div>
        <div class="color-swatch" data-color="#a78bfa" style="background:#a78bfa;"></div>
        <div class="color-swatch" data-color="#4ade80" style="background:#4ade80;"></div>
        <div class="color-swatch" data-color="#fb923c" style="background:#fb923c;"></div>

      <div id="mpanel-workout" class="mnote-panel">
        <div id="note-preview-mw" style="min-height:120px;padding:.5rem .85rem;font-size:.875rem;line-height:1.75;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;outline:none;white-space:pre-wrap;word-break:break-word;" contenteditable="true" data-note="workout"></div>
      </div>
      <div id="mpanel-general" class="mnote-panel" style="display:none;">
        <div id="note-preview-mg" style="min-height:120px;padding:.5rem .85rem;font-size:.875rem;line-height:1.75;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;outline:none;white-space:pre-wrap;word-break:break-word;" contenteditable="true" data-note="general"></div>

      <div id="mpanel-food" class="mnote-panel" style="display:none;">
        <div id="note-preview-mf" style="min-height:120px;padding:.5rem .85rem;font-size:.875rem;line-height:1.75;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;outline:none;white-space:pre-wrap;word-break:break-word;" contenteditable="true" data-note="food"></div>

      <button class="btn btn-cyan" style="width:100%;justify-content:center;margin-top:.9rem;" id="saveNotesMobile"></button>

      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;margin-bottom:1.2rem;">

// ── Bulletproof Storage Layer ─────────────────────────────────────

// Key scheme: zn_day_YYYY-MM-DD for daily data, zn_cfg_* for globals

const LS = {
  get(k, def=null){
    try{ const v=localStorage.getItem(k); return v!==null?JSON.parse(v):def; }catch{ return def; }
  },
  set(k, v){
    try{
      const s=JSON.stringify(v);
      if(s.length>MAX_PAYLOAD){ console.warn('Payload too large for key',k); return false; }
      localStorage.setItem(k,s); return true;
    }catch(e){ console.warn('localStorage write failed',e); return false; }
  },
  del(k){ try{ localStorage.removeItem(k); }catch{} },
  keys(prefix){ try{ return Object.keys(localStorage).filter(k=>k.startsWith(prefix)); }catch{ return []; } }
};

// Debounced Firebase sync

    if(s.length<=MAX_PAYLOAD) db.ref(`${USER_KEY}/${lsKey}`).set(s).catch(()=>{});
  }, 600);
};

  {id:'t2',label:{en:'Work Out',   ar:'ممارسة الرياضة'},done:false,fixed:true,cat:'sport'},
  {id:'t3',label:{en:'Study',      ar:'الدراسة'},done:false,fixed:true,cat:'work'},
];
const DEFAULT_DAY = () => ({
  tasks: JSON.parse(JSON.stringify(DEFAULT_TASKS)),
  meals: [],
  steps: 0,
  notes: {workout:'',general:'',food:''},
  _dateLabel: null,
});

// ── State ─────────────────────────────────────────────────────────

let dayCache = {};
const t = key => (T[lang]||T.ar)[key]||key;
let activeNoteCat='workout', activeCatFilter='all', activeNoteColor='';

// ── Load all data from localStorage ──────────────────────────────
const loadLocalData = () => {
  lang         = loadCfg('lang','en');
  theme        = loadCfg('theme','dark');
  calTarget    = loadCfg('calTarget', 2500);
  stepsTarget  = loadCfg('stepsTarget', 10000);
  customNotifs = loadCfg('customNotifs', []);
  customTasks  = loadCfg('customTasks', []);

  // Load all day entries
  LS.keys('zn_day_').forEach(k=>{
    const date = k.replace('zn_day_','');
    if(/^\d{4}-\d{2}-\d{2}$/.test(date)){
      const v = LS.get(k, null);
      if(v) dayCache[date] = v;
    }
  });
};

// ── Merge Firebase data on top of localStorage (one-time on load) ─
const mergeFirebaseData = (snap) => {
  if(!snap || !snap.val()) return;
  const raw = snap.val();
  const parse = (k,d) => { try{ return raw[k]?JSON.parse(raw[k]):d; }catch{ return d; } };

  // Merge globals only if newer (Firebase wins for cross-device sync)
  ['lang','theme','calTarget','stepsTarget','customNotifs','customTasks'].forEach(k=>{
    const fbKey = `zn_cfg_${k}`;
    if(raw[fbKey]!==undefined){
      try{
        const fbVal = JSON.parse(raw[fbKey]);
        LS.set(fbKey, fbVal);
        if(k==='lang')         lang=fbVal;
        if(k==='theme')        theme=fbVal;
        if(k==='calTarget')    calTarget=fbVal;
        if(k==='stepsTarget')  stepsTarget=fbVal;
        if(k==='customNotifs') customNotifs=fbVal;
        if(k==='customTasks')  customTasks=fbVal;
      }catch{}
    }
  });

  // Merge day entries (Firebase fills any gaps in localStorage)
  Object.keys(raw).forEach(k=>{
    if(k.startsWith('zn_day_')){
      const date = k.replace('zn_day_','');
      if(/^\d{4}-\d{2}-\d{2}$/.test(date)){
        try{
          const fbDay = JSON.parse(raw[k]);
          if(!dayCache[date]){
            dayCache[date] = fbDay;
            LS.set(k, fbDay);
          }
        }catch{}
      }
    }
  });
};

// ── ensureDay: init day if not in cache, merge customTasks ────────
const ensureDay = d => {
  if(!dayCache[d]) dayCache[d] = DEFAULT_DAY();
  // Tag with date label
  if(!dayCache[d]._dateLabel){
    const dt = new Date(d+'T12:00:00');
    dayCache[d]._dateLabel = {
      en: dt.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'}),
      ar: dt.toLocaleDateString('ar-SA',{weekday:'long',year:'numeric',month:'long',day:'numeric'}),
    };
  }
  // Inject custom tasks that are missing from this day
  customTasks.forEach(ct=>{
    if(!dayCache[d].tasks.find(x=>x.id===ct.id)){
      dayCache[d].tasks.push({...ct, done:false});
    }
  });
};

const getDay = d => dayCache[d] || DEFAULT_DAY();

// ── Calendar Bar ──────────────────────────────────────────────────
const renderCalBar = () => {
  const bar=$('calBar'); bar.innerHTML='';
  for(let i=29;i>=0;i--){
    const d=new Date(); d.setDate(d.getDate()-i);
    const key=d.toISOString().slice(0,10);
    const isToday=key===todayKey(), isViewing=key===viewingDate;
    const hasData=!!dayCache[key];
    const dayName=d.toLocaleDateString(lang==='ar'?'ar-SA':'en-US',{weekday:'short'});
    const dayNum=d.getDate();
    const btn=document.createElement('button');
    btn.className=`cal-day-btn${isViewing?' active':''}${hasData&&!isViewing?' has-data':''}`;
    btn.dataset.date=key;
    btn.innerHTML=`<span class="cal-dname">${isToday?(lang==='ar'?'اليوم':'Today'):dayName}</span><span class="cal-dnum">${dayNum}</span>${hasData&&!isViewing?'<span class="cal-dot"></span>':''}`;
    btn.addEventListener('click',()=>{ viewingDate=key; renderCalBar(); renderAll(); updatePastBanner(); });
    bar.appendChild(btn);
  }
  setTimeout(()=>{ const active=bar.querySelector('.active'); if(active)active.scrollIntoView({inline:'center',block:'nearest'}); },50);
};

const updatePastBanner = () => {
  const isToday=viewingDate===todayKey();
  $('pastBanner').style.display=isToday?'none':'flex';
  if(!isToday){
    const d=new Date(viewingDate+'T12:00:00');
    const lbl=d.toLocaleDateString(lang==='ar'?'ar-SA':'en-US',{weekday:'long',month:'long',day:'numeric'});
    $('pastBannerText').textContent=`${t('viewingPast')} ${lbl}`;

};

// ── Tasks ─────────────────────────────────────────────────────────
const CAT_COLORS = {work:'cat-work',sport:'cat-sport',personal:'cat-personal',health:'cat-health',prayer:'cat-prayer'};
const CAT_LABELS = cat=>({work:t('optWork'),sport:t('optSport'),personal:t('optPersonal'),health:t('optHealth'),prayer:t('optPrayer')})[cat]||cat;

const renderTasks = () => {
  const day = getDay(viewingDate);
  const list = $('taskList'); list.innerHTML='';
  const filtered = activeCatFilter==='all' ? day.tasks : day.tasks.filter(x=>x.cat===activeCatFilter);
  filtered.forEach(task=>{
    const lbl = typeof task.label==='object' ? (task.label[lang]||task.label.en) : task.label;
    const catCls = CAT_COLORS[task.cat]||'cat-personal';
    const row = document.createElement('div');
    row.className = `task-row${task.done?' done':''}`;
    row.innerHTML = `
      <label class="cb-wrap" onclick="event.stopPropagation()">
        <input type="checkbox" ${task.done?'checked':''} data-id="${esc(task.id)}"/>
        <div class="cb-box">
          <svg viewBox="0 0 13 13" fill="none" stroke="#080b10" stroke-width="2.5" stroke-linecap="round">
            <polyline points="1.5 7 5 10.5 11.5 2.5"/>
          </svg>
        </div>
      </label>
      <span class="task-lbl" style="flex:1;font-size:.875rem;">${esc(lbl)}</span>
      <span class="cat-badge ${catCls}">${CAT_LABELS(task.cat)}</span>
      <button class="delbtn task-del" title="${t('confirmDelTask')}" data-id="${esc(task.id)}">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>`;
    list.appendChild(row);
  });

  // Checkbox handlers
  list.querySelectorAll('input[type="checkbox"]').forEach(cb=>{
    cb.addEventListener('change',e=>{
      const task=dayCache[viewingDate].tasks.find(x=>x.id===e.target.dataset.id);
      if(!task)return;
      task.done=e.target.checked;
      saveDay(viewingDate);
      const box=e.target.nextElementSibling;
      box.classList.add('pop'); box.addEventListener('animationend',()=>box.classList.remove('pop'),{once:true});
      renderTasks(); updateProgress();
    });
  });

  // Delete handlers — with confirm dialog
  list.querySelectorAll('.task-del').forEach(btn=>{
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      showConfirm(t('confirmDelTask'),t('confirmDelTaskSub'),t('confirmYes'),t('confirmNo'),()=>{
        dayCache[viewingDate].tasks = dayCache[viewingDate].tasks.filter(x=>x.id!==btn.dataset.id);
        // Also remove from customTasks if it was a permanent habit
        const wasCustom = customTasks.findIndex(x=>x.id===btn.dataset.id);
        if(wasCustom>=0){
          customTasks.splice(wasCustom,1);
          saveCfg('customTasks',customTasks);
        }
        saveDay(viewingDate); renderTasks(); updateProgress();
        showToast(lang==='ar'?'تم حذف المهمة 🗑️':'Task deleted 🗑️');
      });
    });
  });

  updateProgress();
};

const updateProgress = () => {
  const day=getDay(viewingDate);
  const total=day.tasks.length, done=day.tasks.filter(x=>x.done).length;
  $('progressBar').style.width = total?Math.round(done/total*100)+'%':'0%';
  $('progressLabel').textContent = `${done}/${total} ${t('tasksDone')}`;
};

$('addTaskBtn').addEventListener('click',()=>{
  const v=sanitizeText($('newTaskInput').value,60);
  if(!v){showToast(lang==='ar'?'أدخل نصًا':'Enter text');return;}
  const allowed=['work','sport','personal','health','prayer'];
  const cat=allowed.includes($('newTaskCat').value)?$('newTaskCat').value:'personal';
  const rl=checkRL('add_task','auth');
  if(!rl.ok){showToast(`${lang==='ar'?'انتظر':'Wait'} ${rl.wait}s`);return;}
  ensureDay(viewingDate);
  dayCache[viewingDate].tasks.push({id:'t'+Date.now(),label:{en:v,ar:v},done:false,fixed:false,cat});
  saveDay(viewingDate); $('newTaskInput').value=''; renderTasks(); updateProgress();
  showToast(lang==='ar'?'تمت الإضافة ✅':'Added ✅');
});

// ── Steps ─────────────────────────────────────────────────────────
const renderSteps = () => {
  const day=getDay(viewingDate);
  const steps=day.steps||0;
  $('stepsCount').textContent=steps.toLocaleString();
  $('stepsTargetInput').value=stepsTarget;
  const circ=2*Math.PI*36, pct=Math.min(steps/stepsTarget,1);
  $('stepsRing').style.strokeDashoffset=circ-circ*pct;
  $('stepsRing').style.stroke=steps>=stepsTarget?'var(--green)':'var(--teal)';
  const rem=stepsTarget-steps;
  $('stepsRemaining').textContent=rem>=0?`${rem.toLocaleString()} ${t('stepsRemaining')}`:`${Math.abs(rem).toLocaleString()} ${t('stepsOver')}`;
  $('stepsRemaining').style.color=rem<0?'var(--rose)':'var(--text2)';
};

$('logStepsBtn').addEventListener('click',()=>{
  const v=sanitizeInt($('stepsInput').value,0,99999);
  if(v===null){showToast(lang==='ar'?'أدخل رقمًا':'Enter a number');return;}
  ensureDay(viewingDate);
  dayCache[viewingDate].steps=v;
  saveDay(viewingDate); renderSteps();
  $('stepsInput').value='';
  showToast(lang==='ar'?`${v.toLocaleString()} خطوة ✅`:`${v.toLocaleString()} steps ✅`);
});

$('stepsTargetInput').addEventListener('change',e=>{

// ── Food Log ──────────────────────────────────────────────────────
// Meal data shape: {id, name, kcal, type:'meal'|'product', protein?, carbs?, fat?, img?, time, detail?}

const renderMeals = () => {
  const day = getDay(viewingDate);
  const meals = day.meals || [];
  const list = $('mealList'), empty = $('emptyMeals');
  list.querySelectorAll('.food-card').forEach(r => r.remove());
  empty.style.display = meals.length ? 'none' : 'block';

  meals.forEach((m, i) => {
    const card = document.createElement('div');
    card.className = 'food-card';

    const imgHtml = m.img
      ? `<img class="food-thumb" src="${m.img}" alt="${esc(m.name)}" loading="lazy"/>`
      : `<div class="food-thumb-placeholder"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--text3)" stroke-width="1.5" stroke-linecap="round"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 002-2V2"/><path d="M7 2v20"/><path d="M21 15V2a5 5 0 00-5 5v6c0 .55.45 1 1 1h3m0 0v7"/></svg></div>`;

    const typeClass = m.type === 'product' ? 'food-type-product' : 'food-type-meal';
    const typeLabel = m.type === 'product' ? '⚖️' : '🍽️';
    const macroHtml = (m.protein || m.carbs || m.fat)
      ? `<div style="display:flex;gap:.3rem;margin-top:.25rem;">
          ${m.protein ? `<span style="font-size:.62rem;color:var(--blue);background:rgba(96,165,250,.1);padding:.05rem .35rem;border-radius:4px;">P ${m.protein}g</span>` : ''}
          ${m.carbs   ? `<span style="font-size:.62rem;color:var(--green);background:rgba(74,222,128,.1);padding:.05rem .35rem;border-radius:4px;">C ${m.carbs}g</span>` : ''}
          ${m.fat     ? `<span style="font-size:.62rem;color:var(--amber);background:rgba(251,191,36,.1);padding:.05rem .35rem;border-radius:4px;">F ${m.fat}g</span>` : ''}
        </div>` : '';
    const detailHtml = m.detail ? `<div style="font-size:.65rem;color:var(--text3);margin-top:.1rem;">${esc(m.detail)}</div>` : '';
    const timeHtml = m.time ? `<div style="font-size:.62rem;color:var(--text3);">${m.time}</div>` : '';

    card.innerHTML = `
      ${imgHtml}
      <div style="flex:1;min-width:0;">
        <div style="display:flex;align-items:center;gap:.4rem;flex-wrap:wrap;">
          <span style="font-size:.85rem;font-weight:600;">${esc(m.name)}</span>
          <span class="food-type-badge ${typeClass}">${typeLabel}</span>
        </div>
        ${detailHtml}${macroHtml}${timeHtml}
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:.15rem;flex-shrink:0;">
        <span style="font-size:.95rem;font-weight:800;color:var(--amber);">${m.kcal}</span>
        <span style="font-size:.62rem;color:var(--text3);">kcal</span>
        <button class="delbtn meal-del" data-i="${i}" style="margin-top:.1rem;">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>`;
    list.appendChild(card);
  });

  list.querySelectorAll('.meal-del').forEach(btn => {
    btn.addEventListener('click', () => {
      dayCache[viewingDate].meals.splice(+btn.dataset.i, 1);
      saveDay(viewingDate); renderMeals();
    });
  });

};

const updateCalStats = meals => {
  const total    = meals.reduce((s, m) => s + m.kcal, 0);
  const proteins = meals.reduce((s, m) => s + (m.protein || 0), 0);
  const carbsT   = meals.reduce((s, m) => s + (m.carbs   || 0), 0);
  const fatsT    = meals.reduce((s, m) => s + (m.fat     || 0), 0);

  // Ring
  const circ = 2 * Math.PI * 44, pct = Math.min(total / calTarget, 1);
  $('calRing').style.strokeDashoffset = circ - circ * pct;
  $('calRing').style.stroke = total > calTarget ? 'var(--rose)' : 'var(--amber)';
  $('calTotal').textContent = total;
  $('calTotalBig').innerHTML = `${total} <span style="font-size:.85rem;color:var(--text2);font-weight:400;">kcal</span>`;
  const rem = calTarget - total;
  $('calRemaining').textContent = rem >= 0
    ? `${rem} kcal ${t('remaining')}`
    : `${Math.abs(rem)} kcal ${t('over')}`;
  $('calRemaining').style.color = rem < 0 ? 'var(--rose)' : 'var(--text2)';

  // Macro mini chips
  const mb = $('macroBar');
  if(mb){
    if(proteins || carbsT || fatsT){
      mb.style.display = 'grid';
      mb.innerHTML = `
        <div class="macro-chip"><span style="font-size:.95rem;font-weight:800;color:var(--blue);">${proteins}g</span><span style="font-size:.6rem;color:var(--text3);margin-top:.15rem;">Protein</span></div>
        <div class="macro-chip"><span style="font-size:.95rem;font-weight:800;color:var(--green);">${carbsT}g</span><span style="font-size:.6rem;color:var(--text3);margin-top:.15rem;">Carbs</span></div>
        <div class="macro-chip"><span style="font-size:.95rem;font-weight:800;color:var(--amber);">${fatsT}g</span><span style="font-size:.6rem;color:var(--text3);margin-top:.15rem;">Fat</span></div>`;
    } else {
      mb.style.display = 'none';
    }
  }
};

$('fmSubmitBtn').addEventListener('click', () => {
  const rl = checkRL('add_meal','auth'); if(!rl.ok){ showToast(`Wait ${rl.wait}s`); return; }
  const now = new Date();
  const timeStr = now.toLocaleTimeString(lang==='ar'?'ar-SA':'en-US', {hour:'2-digit', minute:'2-digit'});

  let libEntry = null; // what gets saved to library

  if(fmType === 'meal'){

    if(!name){ showToast('Enter meal name'); return; }
    if(!kcal){ showToast('Enter calories');  return; }
    const protein = sanitizeInt($('fmMealProtein').value, 0, 999) || 0;
    const carbs   = sanitizeInt($('fmMealCarbs').value,   0, 999) || 0;
    const fat     = sanitizeInt($('fmMealFat').value,     0, 999) || 0;
    entry    = { id:'m'+Date.now(), name, kcal, type:'meal', protein, carbs, fat, time:timeStr };
    libEntry = { sid:'s'+Date.now(), name, kcal, type:'meal', protein, carbs, fat };

  } else { // product
    const name     = sanitizeText($('fmProdName').value, 60);
    const baseKcal = sanitizeInt($('fmProdBaseKcal').value, 1, 9999);
    const baseG    = sanitizeInt($('fmProdBaseG').value, 1, 9999);
    const amount   = sanitizeInt($('fmProdAmount').value, 1, 9999);
    if(!name)    { showToast('Enter product name');  return; }
    if(!baseKcal){ showToast('Enter base calories'); return; }
    if(!baseG)   { showToast('Enter base grams');    return; }
    if(!amount)  { showToast('Enter amount');         return; }
    const kcal    = Math.round((baseKcal / baseG) * amount);
    const protein = sanitizeInt($('fmProdProtein').value, 0, 999) || 0;
    const carbs   = sanitizeInt($('fmProdCarbs').value,   0, 999) || 0;
    const fat     = sanitizeInt($('fmProdFat').value,     0, 999) || 0;
    const detail  = `${amount}g · ${baseKcal} kcal per ${baseG}g`;
    entry    = { id:'m'+Date.now(), name, kcal, type:'product', protein, carbs, fat, time:timeStr, detail };
    libEntry = { sid:'s'+Date.now(), name, type:'product', baseKcal, baseG, protein, carbs, fat };

    if(libEntry) libEntry.img = fmImgData;

  // Save to library if checkbox is ticked and not already saved
  if($('fmSaveChk').checked && libEntry){

      savedMeals.push(libEntry);
      persistSavedMeals();

  ensureDay(viewingDate);

  saveDay(viewingDate);
  renderMeals();
  closeFoodModal();

// Color toolbar
// savedRange: preserve selection when user clicks a swatch (mousedown fires before blur)
let savedRange = null;

const saveSelection = () => {
  const sel = window.getSelection();
  if(sel && sel.rangeCount > 0) savedRange = sel.getRangeAt(0).cloneRange();
};

const restoreSelection = () => {
  if(!savedRange) return false;
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(savedRange);
  return true;
};

const updateSwatchUI = color => {
  activeNoteColor = color;
  ['noteToolbarD','noteToolbarM'].forEach(tid=>{
    const el=$(tid); if(!el) return;
    el.querySelectorAll('.color-swatch').forEach(sw=>sw.classList.toggle('active-swatch', sw.dataset.color===color));
  });
};

// Save selection whenever user interacts with a note editor
Object.values(NOTE_IDS).forEach(({d,m})=>{
  [d,m].forEach(id=>{ const el=$(id); if(!el) return;
    el.addEventListener('mouseup', saveSelection);
    el.addEventListener('keyup',   saveSelection);
  });
});

['noteToolbarD','noteToolbarM'].forEach(tid=>{
  const toolbar=$(tid); if(!toolbar) return;
  toolbar.querySelectorAll('.color-swatch').forEach(sw=>{
    // mousedown: prevent blur so selection isn't lost, then save it
    sw.addEventListener('mousedown', e=>{
      e.preventDefault(); // keeps focus in the editor
      saveSelection();     // capture selection right now (before any focus change)
    });

    sw.addEventListener('click', ()=>{
      const color = sw.dataset.color;
      updateSwatchUI(color);

      const ids = NOTE_IDS[activeNoteCat]; if(!ids) return;
      const activeEl = $(ids.d) || $(ids.m); if(!activeEl) return;

      // Restore the saved selection and apply color
      activeEl.focus();
      if(restoreSelection()){
        const sel = window.getSelection();
        if(sel && !sel.isCollapsed){
          // Text is selected — color it
          if(color){
            document.execCommand('styleWithCSS', false, true);
            document.execCommand('foreColor', false, color);
          } else {
            document.execCommand('removeFormat', false, null);
          }
          saveSelection(); // update savedRange after modification
          saveTodayNotes(false);
          return;
        }
      }
      // Nothing selected — set color for next typed characters
      // We insert a zero-width span so execCommand has a target
      if(color){
        document.execCommand('styleWithCSS', false, true);
        document.execCommand('foreColor', false, color);
      }
    });
  });
});

          <span class="stat-badge sb-cyan">${done}/${total}</span>
          <span class="stat-badge sb-amber">${kcal} kcal</span>
          ${steps?`<span class="stat-badge" style="background:rgba(45,212,191,.1);color:var(--teal);border:1px solid rgba(45,212,191,.25);">${steps.toLocaleString()} 👟</span>`:''}
          <button class="delbtn log-del-btn" data-date="${date}">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="log-body" id="logb-${date}">
        ${d.notes?.workout?`<p style="font-size:.8rem;color:var(--text2);margin-bottom:.4rem;"><strong>🏋️</strong> ${d.notes.workout}</p>`:''}
        ${d.notes?.general?`<p style="font-size:.8rem;color:var(--text2);margin-bottom:.4rem;"><strong>📝</strong> ${d.notes.general}</p>`:''}
        ${d.notes?.food?`<p style="font-size:.8rem;color:var(--text2);"><strong>🥗</strong> ${d.notes.food}</p>`:''}
        ${!d.notes?.workout&&!d.notes?.general&&!d.notes?.food?`<p style="font-size:.8rem;color:var(--text3);">${t('noNotes')}</p>`:''}
      </div>`;
    list.appendChild(card);

    card.querySelector('.log-hdr').addEventListener('click',e=>{
      if(e.target.closest('.log-del-btn'))return;
      $(`logb-${date}`).classList.toggle('open');
    });
    card.querySelector('.log-hdr').addEventListener('dblclick',()=>{
      viewingDate=date; switchTab('today'); renderCalBar(); renderAll(); updatePastBanner();
    });
    card.querySelector('.log-del-btn').addEventListener('click',e=>{
      e.stopPropagation();
      showConfirm(t('delDay'),'',t('confirmYes'),t('confirmNo'),()=>{
        delete dayCache[date];
        LS.del(`zn_day_${date}`);
        if(db) db.ref(`${USER_KEY}/zn_day_${date}`).remove().catch(()=>{});
        renderLog(); renderCalBar();
      });
    });
  });
};

// ── Week Stats ────────────────────────────────────────────────────
const renderWeekStats = () => {
  const days=[];
  for(let i=6;i>=0;i--){
    const d=new Date(); d.setDate(d.getDate()-i);
    const key=d.toISOString().slice(0,10);
    const dayShort=d.toLocaleDateString(lang==='ar'?'ar-SA':'en-US',{weekday:'short'});
    days.push({key,dayShort,entry:dayCache[key]||null});
  }
  const withData=days.filter(d=>d.entry);
  const avgTasks=withData.length?Math.round(withData.map(d=>d.entry.tasks.filter(x=>x.done).length/Math.max(d.entry.tasks.length,1)*100).reduce((a,b)=>a+b,0)/withData.length):0;
  const avgCal=withData.length?Math.round(withData.map(d=>d.entry.meals.reduce((s,m)=>s+m.kcal,0)).reduce((a,b)=>a+b,0)/withData.length):0;
  let bestDay=null, bestPct=0;
  withData.forEach(d=>{
    const pct=d.entry.tasks.filter(x=>x.done).length/Math.max(d.entry.tasks.length,1)*100;
    if(pct>bestPct){bestPct=pct;bestDay=d;}
  });
  $('wAvgTasks').textContent=withData.length?avgTasks+'%':'—';
  $('wAvgCal').textContent=withData.length?avgCal.toLocaleString():'—';
  $('wBestDay').textContent=bestDay?bestDay.dayShort:'—';

  const maxTask=Math.max(...days.map(d=>d.entry?d.entry.tasks.length:0),1);
  const maxCal =Math.max(...days.map(d=>d.entry?d.entry.meals.reduce((s,m)=>s+m.kcal,0):0),1);

  $('wTaskChart').innerHTML=''; $('wTaskChartLabels').innerHTML='';
  $('wCalChart').innerHTML='';  $('wCalChartLabels').innerHTML='';

  days.forEach(d=>{
    const isTd=d.key===todayKey();
    const done=d.entry?d.entry.tasks.filter(x=>x.done).length:0;
    const total=d.entry?d.entry.tasks.length:0;
    const h=Math.round(total?done/total*80:0);
    const bt=document.createElement('div'); bt.className='wbar-wrap';
    bt.innerHTML=`<div class="wbar-val" style="color:${done>0?'var(--cyan)':'var(--text3)'};">${done||''}</div><div class="wbar-bg"><div class="wbar-fill" style="height:${h}px;background:${isTd?'linear-gradient(0deg,var(--cyan),var(--violet))':'rgba(34,211,238,.4)'};"></div></div>`;
    $('wTaskChart').appendChild(bt);
    const lt=document.createElement('div'); lt.className='wbar-wrap';
    lt.innerHTML=`<div class="wbar-lbl" style="color:${isTd?'var(--cyan)':'var(--text3)'};">${d.dayShort}</div>`;
    $('wTaskChartLabels').appendChild(lt);

    const kcal=d.entry?d.entry.meals.reduce((s,m)=>s+m.kcal,0):0;
    const hc=Math.round(kcal/maxCal*80);
    const over=d.entry&&kcal>calTarget;
    const bc=document.createElement('div'); bc.className='wbar-wrap';
    bc.innerHTML=`<div class="wbar-val" style="color:${over?'var(--rose)':kcal>0?'var(--amber)':'var(--text3)'};">${kcal>0?kcal.toLocaleString():''}</div><div class="wbar-bg"><div class="wbar-fill" style="height:${hc}px;background:${over?'var(--rose)':isTd?'linear-gradient(0deg,var(--amber),var(--rose))':'rgba(251,191,36,.4)'};"></div></div>`;
    $('wCalChart').appendChild(bc);
    const lc=document.createElement('div'); lc.className='wbar-wrap';
    lc.innerHTML=`<div class="wbar-lbl" style="color:${isTd?'var(--amber)':'var(--text3)'};">${d.dayShort}</div>`;
    $('wCalChartLabels').appendChild(lc);
  });

  const catTotals={work:{done:0,total:0},sport:{done:0,total:0},personal:{done:0,total:0},health:{done:0,total:0}};
  days.forEach(d=>{
    if(!d.entry)return;
    Object.keys(catTotals).forEach(cat=>{
      catTotals[cat].done  += d.entry.tasks.filter(x=>x.cat===cat&&x.done).length;
      catTotals[cat].total += d.entry.tasks.filter(x=>x.cat===cat).length;
    });
  });
  const catColors={work:'var(--blue)',sport:'var(--cyan)',personal:'var(--violet)',health:'var(--amber)'};
  const catIcons ={work:'💼',sport:'🏃',personal:'🌱',health:'💊'};
  $('wCatBreakdown').innerHTML=Object.entries(catTotals).map(([cat,{done,total}])=>{
    const pct=total?Math.round(done/total*100):0;
    return `<div><div style="display:flex;justify-content:space-between;font-size:.78rem;margin-bottom:.3rem;"><span>${catIcons[cat]} ${CAT_LABELS(cat)}</span><span style="color:${catColors[cat]};font-weight:700;">${pct}%</span></div><div class="pbar"><div style="height:100%;border-radius:99px;background:${catColors[cat]};width:${pct}%;transition:width .5s cubic-bezier(.4,0,.2,1);"></div></div></div>`;
  }).join('');
};

// ── Notifications ─────────────────────────────────────────────────
const updateNotifStatus = () => {
  const perm=('Notification' in window)?Notification.permission:'unsupported';
  $('notifStatus').textContent={granted:t('notifGranted'),denied:t('notifDenied'),default:t('notifDefault'),unsupported:'غير مدعوم'}[perm]||'';
  $('enableNotifBtn').style.display=perm==='granted'?'none':'flex';
};

$('enableNotifBtn').addEventListener('click',async()=>{
  if(!('Notification' in window)){showToast(lang==='ar'?'غير مدعوم في هذا المتصفح':'Not supported in this browser');return;}
  if(Notification.permission==='denied'){
    showToast(lang==='ar'?'محجوبة — اسمح يدويًا من الإعدادات':'Blocked — allow manually in settings');
    return;
  }
  const result=await Notification.requestPermission();
  updateNotifStatus();
  if(result==='granted'){
    showToast(lang==='ar'?'تم تفعيل الإشعارات ✅':'Notifications enabled ✅');
    setTimeout(()=>{
      try{
        new Notification(lang==='ar'?'يومي 🎉':'My Day 🎉',{
          body:lang==='ar'?'الإشعارات تعمل بنجاح!':'Notifications are working!',
          icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><circle cx="16" cy="16" r="14" fill="%2322d3ee"/><path d="M16 9v7l4 3" stroke="%23080b10" stroke-width="2" stroke-linecap="round"/></svg>'
        });
      }catch(e){ console.warn('Notification failed:',e); }
    },300);
  } else {
    showToast(lang==='ar'?'لم يتم السماح بالإشعارات':'Permission not granted');
  }
});

const renderCustomNotifs = () => {
  const list=$('customNotifList'); list.innerHTML='';
  if(!customNotifs.length){
    list.innerHTML=`<p style="font-size:.8rem;color:var(--text3);">${t('noReminders')}</p>`;
    return;
  }
  customNotifs.forEach((n,i)=>{
    const row=document.createElement('div'); row.className='notif-row';
    row.innerHTML=`
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="2" stroke-linecap="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
      <div style="flex:1;">
        <div style="font-size:.82rem;font-weight:600;">${esc(n.msg)}</div>
        <div style="font-size:.72rem;color:var(--text3);">${n.time}</div>
      </div>
      <button class="delbtn del-custom" data-i="${i}">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="var(--danger)" stroke-width="2.5" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>`;
    list.appendChild(row);
  });
  list.querySelectorAll('.del-custom').forEach(btn=>{
    btn.addEventListener('click',()=>{
      customNotifs.splice(+btn.dataset.i,1);
      saveCfg('customNotifs',customNotifs);
      renderCustomNotifs(); scheduleNotifs();
    });
  });
};

$('addCustomNotifBtn').addEventListener('click',()=>{
  const msg=sanitizeText($('customNotifMsg').value,60);
  const time=$('customNotifTime').value;
  if(!msg||!time){showToast(lang==='ar'?'أدخل نص ووقت':'Enter message and time');return;}
  const rl=checkRL('add_notif','auth'); if(!rl.ok){showToast(`Wait ${rl.wait}s`);return;}
  customNotifs.push({msg,time});
  saveCfg('customNotifs',customNotifs);
  $('customNotifMsg').value='';
  renderCustomNotifs(); scheduleNotifs();
  showToast(lang==='ar'?'تم إضافة التذكير ✅':'Reminder added ✅');
});

const scheduleNotifs = () => {
  clearInterval(window._ni);
  window._ni=setInterval(()=>{
    if(Notification.permission!=='granted')return;
    const now=new Date();
    const hhmm=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
    customNotifs.forEach(n=>{
      if(n.time===hhmm){
        try{ new Notification('🔔 يومي',{body:n.msg}); }catch{}
      }
    });
  },30000);
};

// ── Confirm dialog ────────────────────────────────────────────────
let _cb=null;
const showConfirm = (msg,sub,ok,cancel,cb) => {
  $('confirmMsg').textContent=msg; $('confirmSub').textContent=sub;
  $('confirmOk').textContent=ok;   $('confirmCancel').textContent=cancel;
  _cb=cb; $('confirmDialog').classList.add('open');
};
$('confirmOk').addEventListener('click',()=>{ $('confirmDialog').classList.remove('open'); if(_cb){_cb();_cb=null;} });
$('confirmCancel').addEventListener('click',()=>{ $('confirmDialog').classList.remove('open'); _cb=null; });
$('confirmDialog').addEventListener('click',e=>{ if(e.target===$('confirmDialog')){$('confirmDialog').classList.remove('open');_cb=null;} });

// ── Toast ─────────────────────────────────────────────────────────
let _tt=null;
const showToast = msg => {
  const el=$('toast'); el.textContent=msg;
  el.style.opacity='1'; el.style.transform='translateX(-50%) translateY(0)';
  clearTimeout(_tt);
  _tt=setTimeout(()=>{ el.style.opacity='0'; el.style.transform='translateX(-50%) translateY(80px)'; },2800);
};

// ── Init ──────────────────────────────────────────────────────────
function init() {
  loadSavedMeals();
  applyTheme();
  applyLang();
  viewingDate=todayKey();
  ensureDay(viewingDate);
  switchNoteCat('workout');
  scheduleNotifs();
  renderCustomNotifs();
  updatePastBanner();
}

// ── Bootstrap (runs after ALL functions defined) ──────────────────
loadLocalData();
init();

// Firebase sync in background — never blocks UI
setTimeout(()=>{
  initFirebase().then(database=>{
    db = database;
    if(!db) return;
    const fbFetch   = db.ref(USER_KEY).once('value');
    const fbTimeout = new Promise((_,rej)=>setTimeout(()=>rej('timeout'),8000));
    Promise.race([fbFetch, fbTimeout]).then(snap=>{
      mergeFirebaseData(snap);
      renderAll();
      renderCalBar();
    }).catch(()=>{});
  }).catch(()=>{});
}, 100);
</script>
